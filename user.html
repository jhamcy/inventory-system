<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff & Security | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        
        :root { 
            --primary: #0f172a; 
            --accent: #3b82f6; 
            --danger: #ef4444; 
            --success: #10b981;
            --border-main: #cbd5e1;
        }

        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; flex-direction: column; }

        .navbar { height: 60px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; z-index: 1000; border-bottom: 2px solid var(--accent); }
        .nav-title { color: white; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; gap: 15px; }

        .right-panel { flex: 1; display: grid; grid-template-columns: 1fr; gap: 15px; overflow: hidden; }
        @media (min-width: 1024px) {
            .right-panel { grid-template-columns: 350px 1fr; }
        }

        .card { background: white; border-radius: 12px; border: 2px solid var(--primary); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-header { padding: 12px; background: #f8fafc; border-bottom: 2px solid var(--primary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--primary); }
        
        .scroll-body { flex: 1; overflow-y: auto; padding: 15px; }

        .form-grid { display: flex; flex-direction: column; gap: 10px; }
        input, select { padding: 12px; border: 2px solid var(--border-main); border-radius: 8px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); background: #f0f7ff; }

        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; }
        .btn-update { background: var(--accent); color: white; display: none; }
        .btn-cancel { background: #64748b; color: white; margin-top: 5px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 600px; }
        thead th { position: sticky; top: 0; background: #f8fafc; z-index: 10; padding: 12px; font-size: 0.6rem; border-bottom: 2px solid var(--primary); text-align: left; }
        tbody td { padding: 12px; border-bottom: 1px solid var(--border-main); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        tr:hover { background: #f0f9ff; cursor: pointer; }

        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.55rem; color: white; background: #64748b; }
        .role-admin { background: var(--danger); }
        .role-warehouse { background: #f97316; }
        .role-sales { background: #10b981; }
        .pass-code { font-family: monospace; color: var(--accent); letter-spacing: 1px; }
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-title" id="page-header">Security & Staff Management</div>
    <a href="dashboard.html" style="color:white; font-size:0.6rem; font-weight:800; text-decoration:none; border:2px solid var(--accent); padding:6px 12px; border-radius:6px; background: rgba(59, 130, 246, 0.1);">BACK TO DASH</a>
</header>

<main class="main-content">
    <div class="right-panel">
        <div class="card">
            <div class="card-header" id="form-title">Account Registration</div>
            <div class="scroll-body">
                <div class="form-grid">
                    <input type="text" id="id-in" placeholder="EMPLOYEE ID">
                    <input type="text" id="name-in" placeholder="FULL NAME">
                    <input type="text" id="user-in" placeholder="USERNAME">
                    <input type="text" id="pass-in" placeholder="PASSWORD">
                    
                    <select id="role-in">
                        <option value="WAREHOUSE STAFF">WAREHOUSE STAFF</option>
                        <option value="SALES STAFF">SALES STAFF</option>
                        <option value="ADMIN">ADMINISTRATOR</option>
                        <option value="OWNER">OWNER</option>
                    </select>
                    
                    <button id="btn-save" class="btn-action btn-save" onclick="saveUser()">Create Account</button>
                    <button id="btn-update" class="btn-action btn-update" onclick="updateUser()">Update Details</button>
                    <button id="btn-cancel" class="btn-action btn-cancel" onclick="resetForm()" style="display:none;">Cancel Edit</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Active Staff Directory</div>
            <div class="scroll-body" style="padding:0;">
                <table>
                    <thead>
                        <tr>
                            <th>STAFF ID</th>
                            <th>NAME</th>
                            <th>USER</th>
                            <th>PASS</th>
                            <th>ROLE</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
    const _URL = 'https://pehffyqlssrqogosfsab.supabase.co';
    const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s';
    
    let _sb;
    let editingUserId = null;

    function init() {
        _sb = supabase.createClient(_URL, _KEY);
        
        const role = localStorage.getItem('jmcy_role');
        const cid = localStorage.getItem('jmcy_cid');

        if (!role || !cid) {
            window.location.href = 'portal.html';
            return;
        }

        if (role !== 'OWNER' && role !== 'ADMIN') {
            window.location.href = 'inventory.html';
            return;
        }
        
        loadTable();
    }

    async function loadTable() {
        const cid = localStorage.getItem('jmcy_cid');
        const { data, error } = await _sb
            .from('staff_members')
            .select('*')
            .eq('company_id', cid)
            .order('full_name');
        
        if (error) { console.error(error); return; }
        renderTable(data);
    }

    function renderTable(data) {
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = data.map(u => {
            let roleClass = '';
            if(u.role === 'OWNER' || u.role === 'ADMIN') roleClass = 'role-admin';
            else if(u.role === 'WAREHOUSE STAFF') roleClass = 'role-warehouse';
            else if(u.role === 'SALES STAFF') roleClass = 'role-sales';

            return `
            <tr onclick='activateEditMode(${JSON.stringify(u)})'>
                <td style="color:#64748b;">#${u.staff_id || '---'}</td>
                <td>${u.full_name}</td>
                <td style="color:var(--accent); font-weight:800;">${u.username}</td>
                <td class="pass-code">${u.password}</td>
                <td><span class="role-badge ${roleClass}">${u.role}</span></td>
                <td>
                    <button style="color:var(--danger); background:none; border:none; font-weight:800; cursor:pointer;" onclick="event.stopPropagation(); delUser('${u.username}')">DEL</button>
                </td>
            </tr>
        `}).join('');
    }

    function activateEditMode(user) {
        editingUserId = user.username;
        document.getElementById('form-title').innerText = "Edit: " + user.username;
        document.getElementById('id-in').value = user.staff_id || "";
        document.getElementById('name-in').value = user.full_name || "";
        document.getElementById('user-in').value = user.username;
        document.getElementById('pass-in').value = user.password;
        document.getElementById('role-in').value = user.role;
        
        document.getElementById('btn-save').style.display = 'none';
        document.getElementById('btn-update').style.display = 'block';
        document.getElementById('btn-cancel').style.display = 'block';
    }

    function resetForm() {
        editingUserId = null;
        document.getElementById('form-title').innerText = "Account Registration";
        document.querySelectorAll('.form-grid input').forEach(i => i.value = "");
        document.getElementById('btn-save').style.display = 'block';
        document.getElementById('btn-update').style.display = 'none';
        document.getElementById('btn-cancel').style.display = 'none';
    }

    async function saveUser() {
        const payload = getFormData();
        if(!payload.username || !payload.password) return alert("Fill required fields!");
        payload.company_id = localStorage.getItem('jmcy_cid');
        
        const { error } = await _sb.from('staff_members').insert([payload]);
        if(error) alert(error.message);
        else { resetForm(); loadTable(); }
    }

    async function updateUser() {
        const cid = localStorage.getItem('jmcy_cid');
        const payload = getFormData();
        
        const { error } = await _sb.from('staff_members')
            .update(payload)
            .eq('username', editingUserId)
            .eq('company_id', cid);

        if(error) alert(error.message);
        else { resetForm(); loadTable(); }
    }

    function getFormData() {
        return {
            staff_id: document.getElementById('id-in').value.trim().toUpperCase(),
            full_name: document.getElementById('name-in').value.trim().toUpperCase(),
            username: document.getElementById('user-in').value.trim().toUpperCase(),
            password: document.getElementById('pass-in').value.trim().toUpperCase(),
            role: document.getElementById('role-in').value
        };
    }

    async function delUser(username) {
        const cid = localStorage.getItem('jmcy_cid');
        if(!confirm(`Delete user ${username}?`)) return;
        
        const { error } = await _sb.from('staff_members')
            .delete()
            .eq('username', username)
            .eq('company_id', cid);

        if(error) alert(error.message);
        else loadTable();
    }

    window.onload = init;
</script>
</body>
</html>
