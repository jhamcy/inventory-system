<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #3b82f6;
            --dark-bg: #0f172a;
            --error: #ef4444;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            padding: 40px; border-radius: 28px;
            width: 90%; max-width: 380px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: none; 
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo Styling */
        #logo-container { margin-bottom: 20px; }
        #logo-container img { 
            max-width: 120px; 
            max-height: 80px; 
            object-fit: contain; 
            border-radius: 12px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .brand-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -1.5px; }
        .brand-title span { color: var(--primary); }
        .portal-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #38bdf8; margin-bottom: 8px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-size: 1rem; transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--primary); background: rgba(15, 23, 42, 0.9); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .btn-login {
            width: 100%; padding: 16px; background: var(--primary);
            color: white; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-login:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.6; cursor: wait; }

        /* Shake animation for errors */
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
    </style>
</head>
<body>

    <div class="login-card" id="loginCard">
        <!-- Logo will be injected here -->
        <div id="logo-container"></div>

        <div class="brand-title" id="companyName">Jmcy<span>Flow</span></div>
        <span class="portal-label" id="portalIdDisplay">Secure Access</span>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>
        
        <p style="margin-top: 25px; font-size: 0.65rem; color: #64748b; font-weight: 600;">
            SYSTEM v3.0 | JMCY WEB SOLUTIONS
        </p>
    </div>

    <script>
        const SUPABASE_URL = "https://pehffyqlssrqogosfsab.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeCompanyData = null;

        async function initPortal() {
            const urlParams = new URLSearchParams(window.location.search);
            const portalId = urlParams.get('id');

            if (!portalId) {
                document.getElementById('portalIdDisplay').innerHTML = 'System Preview <span style="background:#fbbf24;color:#000;padding:2px 6px;border-radius:5px;font-size:0.6rem;">DEMO</span>';
                document.getElementById('loginCard').style.display = 'block';
                return; 
            }

            const { data, error } = await _supabase
                .from('companies')
                .select('*')
                .eq('portal_id', portalId.toLowerCase())
                .single();

            if (data) {
                activeCompanyData = data;
                
                // Set Logo if exists
                if(data.company_logo) {
                    document.getElementById('logo-container').innerHTML = `<img src="${data.company_logo}" alt="Logo">`;
                }

                document.getElementById('companyName').innerText = data.company_name;
                document.getElementById('portalIdDisplay').innerText = `Portal: ${data.portal_id}`;
                document.documentElement.style.setProperty('--primary', data.theme_color);
                document.getElementById('loginCard').style.display = 'block';
            } else {
                document.getElementById('portalIdDisplay').innerText = "Portal Not Found";
                document.getElementById('portalIdDisplay').style.color = "#ef4444";
                document.getElementById('loginCard').style.display = 'block';
            }
        }

        async function handleLogin() {
            if (!activeCompanyData) {
                alert("Layout Preview: Please use a valid portal ID to test login.");
                return;
            }

            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            const card = document.getElementById('loginCard');

            if (!userIn || !passIn) return;

            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying...";

            // 1. Check Master Admin
            if (userIn === activeCompanyData.admin_user && passIn === activeCompanyData.admin_pass) {
                saveAndRedirect('admin', userIn);
                return;
            }

            // 2. Check Staff Table
            const { data: staff, error } = await _supabase
                .from('staff_members')
                .select('*')
                .eq('company_id', activeCompanyData.id)
                .eq('username', userIn)
                .single();

            if (staff && staff.password === passIn) {
                saveAndRedirect('staff', userIn);
            } else {
                // Fail Animation
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
                alert("Invalid Username or Password");
                loginBtn.disabled = false;
                loginBtn.innerText = "Sign In";
            }
        }

        function saveAndRedirect(role, username) {
            localStorage.setItem('jmcy_role', role);
            localStorage.setItem('jmcy_user', username);
            localStorage.setItem('jmcy_cid', activeCompanyData.id);
            localStorage.setItem('jmcy_portal', activeCompanyData.portal_id);

            // Redirect Logic
            if (role === 'admin') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'inventory.html';
            }
        }

        initPortal();
    </script>
</body>
</html>
