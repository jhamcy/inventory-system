<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | JmcyFlow POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root { --primary: #3b82f6; --dark-bg: #0f172a; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 28px;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Logo Styling */
        #logo-container { margin-bottom: 20px; display: flex; justify-content: center; min-height: 40px; }
        #logo-container img { max-width: 180px; max-height: 100px; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }

        /* Text Adjustments */
        .brand-title { 
            font-size: 1.8rem; /* Increased size */
            font-weight: 800; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            color: white; 
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        
        .portal-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block; font-weight: 700; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: white; font-size: 1rem; box-sizing: border-box; outline: none;
        }

        input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.9); }

        .btn-login {
            width: 100%; padding: 16px; background: var(--primary);
            color: white; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }

        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg { color: #f87171; font-size: 0.75rem; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card" id="loginCard">
        <!-- Logo appears here first -->
        <div id="logo-container"></div>
        
        <!-- Company Name second -->
        <div class="brand-title" id="companyName">Initializing...</div>
        <span class="portal-label" id="portalIdDisplay">Locating Node...</span>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Authorize Access</button>
        <div id="errorBox" class="error-msg">Access Denied: Invalid Credentials.</div>
        
        <p style="margin-top: 25px; font-size: 0.55rem; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">
            SECURE MANAGED INSTANCE • 2026
        </p>
    </div>

    <script>
        const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');

        let activeCompany = null;

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const portalId = urlParams.get('id');

            if (!portalId) {
                document.getElementById('portalIdDisplay').innerText = "PORTAL ID MISSING";
                return;
            }

            const { data, error } = await _sb.from('companies').select('*').eq('portal_id', portalId.toLowerCase()).single();

            if (data) {
                activeCompany = data;
                document.getElementById('companyName').innerText = data.company_name;
                document.getElementById('portalIdDisplay').innerText = `NODE: ${data.portal_id.toUpperCase()}`;
                
                // Show Logo if available
                if (data.logo_url) {
                    document.getElementById('logo-container').innerHTML = `<img src="${data.logo_url}" alt="Logo">`;
                }

                if(data.theme_color) document.documentElement.style.setProperty('--primary', data.theme_color);
                
                localStorage.setItem('jmcy_portal_id', data.portal_id);
            } else {
                document.getElementById('portalIdDisplay').innerText = "INVALID PORTAL";
            }
        };

        async function handleLogin() {
            const userIn = document.getElementById('username').value.trim().toUpperCase();
            const passIn = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errBox = document.getElementById('errorBox');

            if (!activeCompany || !userIn || !passIn) return;

            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";
            errBox.style.display = "none";

            const { data: user, error } = await _sb.from('staff_members')
                .select('*')
                .eq('company_id', activeCompany.id)
                .eq('username', userIn)
                .eq('password', passIn) 
                .single();

            if (user) {
                localStorage.setItem('jmcy_role', user.role);
                localStorage.setItem('jmcy_username', user.username);
                localStorage.setItem('jmcy_fullname', user.full_name);
                localStorage.setItem('jmcy_cid', activeCompany.id); 
                
                if (user.role === 'OWNER') {
                    window.location.href = 'dashboard.html';
                } else if (user.role === 'SALES STAFF') {
                    window.location.href = 'sales.html';
                } else if (user.role === 'WAREHOUSE STAFF') {
                    window.location.href = 'inventory.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } else {
                errBox.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Authorize Access";
            }
        }
    </script>
</body>
</html>
