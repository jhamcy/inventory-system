<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | JmcyFlow POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root { --primary: #3b82f6; --dark-bg: #0f172a; }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 28px;
            width: 90%; max-width: 400px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        #logo-container { 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 80px; 
        }
        #logo-container img { 
            max-width: 180px; 
            max-height: 90px; 
            object-fit: contain; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4)); 
        }

        .brand-title { 
            font-size: 1.6rem; 
            font-weight: 800; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            color: white; 
            letter-spacing: -0.5px;
        }
        
        .portal-label { font-size: 0.6rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; display: block; font-weight: 700; opacity: 0.8; }

        .form-group { text-align: left; margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 0.65rem; font-weight: 700; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px;
            color: white; font-size: 0.95rem; box-sizing: border-box; outline: none;
            text-transform: uppercase;
        }

        input:focus { border-color: var(--primary); background: rgba(15, 23, 42, 0.9); border-width: 2px; }

        /* Password Toggle Styling */
        .pass-wrapper { position: relative; display: flex; align-items: center; }
        .toggle-btn {
            position: absolute; right: 12px; background: none; border: none;
            color: #94a3b8; cursor: pointer; font-size: 0.6rem; font-weight: 800;
            padding: 5px; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.2s; z-index: 5;
        }
        .toggle-btn:hover { color: var(--primary); }

        .btn-login {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }

        .btn-login:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-return {
            display: inline-block; margin-top: 15px; color: #94a3b8;
            font-size: 0.65rem; font-weight: 700; text-decoration: none;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            cursor: pointer; background: none; border: none;
        }
        .btn-return:hover { color: var(--primary); }

        .error-msg { color: #f87171; font-size: 0.7rem; margin-top: 12px; display: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div id="logo-container"></div>
        
        <div class="brand-title" id="companyName">SYSTEM CONNECTING</div>
        <span class="portal-label" id="portalIdDisplay">PLEASE WAIT...</span>
        
        <div class="form-group">
            <label>User Identity</label>
            <input type="text" id="username" placeholder="USERNAME" oninput="this.value = this.value.toUpperCase()">
        </div>

        <div class="form-group">
            <label>Access Key</label>
            <div class="pass-wrapper">
                <input type="password" id="password" placeholder="••••••••" oninput="this.value = this.value.toUpperCase()">
                <button type="button" class="toggle-btn" onclick="togglePassword()">
                    <span id="toggleText">SHOW</span>
                </button>
            </div>
        </div>
        
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Authorize Access</button>
        
        <button class="btn-return" onclick="window.location.href='portal.html'">← Back to Portal Search</button>

        <div id="errorBox" class="error-msg">⚠️ ACCESS DENIED: INVALID CREDENTIALS</div>
        
        <p style="margin-top: 25px; font-size: 0.5rem; color: #475569; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">
            SECURE MANAGED INSTANCE • 2026
        </p>
    </div>

    <script>
        const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');

        let activeCompany = null;

        // Toggle Password Function using Words
        function togglePassword() {
            const passInput = document.getElementById('password');
            const toggleText = document.getElementById('toggleText');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                toggleText.innerText = 'HIDE';
            } else {
                passInput.type = 'password';
                toggleText.innerText = 'SHOW';
            }
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            let portalId = urlParams.get('id');

            if (!portalId) {
                document.getElementById('companyName').innerText = "LINK EXPIRED";
                document.getElementById('portalIdDisplay').innerText = "MISSING PORTAL KEY";
                return;
            }

            portalId = portalId.trim().toUpperCase();

            const { data, error } = await _sb.from('companies').select('*').eq('portal_id', portalId).maybeSingle();

            if (data) {
                activeCompany = data;
                document.getElementById('companyName').innerText = data.company_name;
                document.getElementById('portalIdDisplay').innerText = `NODE ID: ${data.portal_id}`;
                
                if(data.theme_color) document.documentElement.style.setProperty('--primary', data.theme_color);

                if (data.logo_url && data.logo_url !== "") {
                    document.getElementById('logo-container').innerHTML = `<img src="${data.logo_url}" alt="Logo" onerror="this.style.display='none'">`;
                }
            } else {
                document.getElementById('companyName').innerText = "INVALID NODE";
                document.getElementById('portalIdDisplay').innerText = "UNAUTHORIZED ACCESS";
            }
        };

        async function handleLogin() {
            const userIn = document.getElementById('username').value.trim().toUpperCase();
            const passIn = document.getElementById('password').value.trim().toUpperCase();
            const btn = document.getElementById('loginBtn');
            const errBox = document.getElementById('errorBox');

            if (!activeCompany) return;
            if (!userIn || !passIn) {
                errBox.style.display = "block";
                errBox.innerText = "⚠️ ENTER ALL CREDENTIALS";
                return;
            }

            btn.disabled = true;
            btn.innerText = "AUTHENTICATING...";
            errBox.style.display = "none";

            try {
                const { data: user, error } = await _sb.from('staff_members')
                    .select('*')
                    .eq('company_id', activeCompany.id) 
                    .eq('username', userIn)
                    .eq('password', passIn) 
                    .maybeSingle();

                if (user) {
                    localStorage.setItem('jmcy_cid', activeCompany.id); 
                    localStorage.setItem('jmcy_role', user.role.toUpperCase());
                    localStorage.setItem('jmcy_username', user.username);
                    localStorage.setItem('jmcy_fullname', user.full_name || user.username);
                    
                    const routes = {
                        'OWNER': 'dashboard.html',
                        'ADMIN': 'dashboard.html',
                        'SALES STAFF': 'sales.html',
                        'WAREHOUSE STAFF': 'inventory.html'
                    };

                    const target = routes[user.role.toUpperCase()] || 'dashboard.html';
                    window.location.href = target;
                } else {
                    throw new Error("Invalid User");
                }
            } catch (err) {
                errBox.style.display = "block";
                errBox.innerText = "⚠️ ACCESS DENIED: INVALID CREDENTIALS";
                btn.disabled = false;
                btn.innerText = "Authorize Access";
            }
        }
    </script>
</body>
</html>
