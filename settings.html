<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN SETTINGS | JMCYFLOW</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f1f5f9; --border: #e2e8f0; --text: #1e293b; --danger: #ef4444; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { margin: 0; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .nav { height: 60px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); flex-shrink: 0; z-index: 1000; }
        .nav-title { color: white; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .back-link { color: white; text-decoration: none; font-size: 0.6rem; font-weight: 800; border: 2px solid var(--accent); padding: 6px 12px; border-radius: 6px; background: rgba(59, 130, 246, 0.1); text-transform: uppercase; }

        .container { flex: 1; overflow-y: auto; padding: 20px; }
        .wrapper { max-width: 700px; margin: 0 auto; }
        
        .card { background: white; border-radius: 12px; border: 2px solid var(--primary); padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 1rem; font-weight: 800; margin: 0 0 10px 0; display: flex; align-items: center; gap: 10px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        p { font-size: 0.75rem; color: #64748b; margin-top: -5px; margin-bottom: 25px; font-weight: 600; }

        .logo-upload-section { display: flex; align-items: center; gap: 20px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 2px dashed var(--border); margin-bottom: 20px; }
        .logo-preview { width: 100px; height: 100px; background: white; border: 2px solid var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .logo-controls { flex: 1; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: 800; color: var(--primary); margin-bottom: 6px; display: block; text-transform: uppercase; }
        
        input, textarea { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 0.85rem; font-weight: 700; outline: none; background: #f8fafc; transition: 0.2s; text-transform: uppercase; }
        input[type="file"] { padding: 8px; font-size: 0.7rem; background: transparent; border: none; }
        input:focus, textarea:focus { border-color: var(--accent); background: white; }

        .btn-save { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 8px; font-weight: 800; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-save:hover { background: #1e293b; }
        
        .info-box { background: #f0f9ff; border-left: 4px solid var(--accent); padding: 10px; margin-bottom: 20px; font-size: 0.65rem; font-weight: 700; color: var(--primary); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-title">System Configuration</div>
    <a href="dashboard.html" class="back-link">BACK TO DASHBOARD</a>
</nav>

<div class="container">
    <div class="wrapper">
        <div class="info-box" id="portal-display">PORTAL ID: LOADING...</div>

        <!-- Brand Identity -->
        <div class="card">
            <h2>🖼️ Brand Identity</h2>
            <p>Update your company logo stored in the jmcyflow bucket.</p>
            <div class="logo-upload-section">
                <div class="logo-preview">
                    <img id="logo-img" src="" style="display: none;">
                    <span id="no-logo-text" style="font-size: 0.55rem; color: #94a3b8; text-align: center;">NO LOGO</span>
                </div>
                <div class="logo-controls">
                    <label>Replace Logo</label>
                    <input type="file" id="logo-input" accept="image/*" onchange="previewLogo(this)">
                </div>
            </div>
        </div>

        <!-- Business Profile -->
        <div class="card">
            <h2>🏢 Business Profile</h2>
            <p>Official company details for system-wide documents.</p>
            
            <div class="form-group">
                <label>Registered Business Name</label>
                <input type="text" id="biz-name" placeholder="E.G. JMCY FLOW TRADING">
            </div>

            <div class="form-group">
                <label>TIN Number</label>
                <input type="text" id="biz-tin" placeholder="000-000-000-000">
            </div>

            <div class="form-group">
                <label>Registered Address</label>
                <textarea id="biz-addr" rows="3" placeholder="BUILDING, STREET, CITY, ZIP"></textarea>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="biz-phone" placeholder="09XX-XXX-XXXX">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="biz-email" style="text-transform: none;" placeholder="admin@jmcyflow.com">
                </div>
            </div>
            
            <button class="btn-save" id="save-btn" onclick="saveSettings()">💾 SAVE ALL CHANGES</button>
        </div>
    </div>
</div>

<script>
    const _URL = 'https://pehffyqlssrqogosfsab.supabase.co';
    const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s';
    const _sb = supabase.createClient(_URL, _KEY);
    
    const companyId = localStorage.getItem('jmcy_cid');
    const userRole = localStorage.getItem('jmcy_role');
    let currentLogoUrl = "";

    window.onload = async () => {
        if(!companyId || !userRole) {
            window.location.href = "portal.html";
            return;
        }
        document.getElementById('portal-display').innerText = `PORTAL ID: ${companyId}`;
        loadCurrentData();
    };

    function previewLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('logo-img');
                img.src = e.target.result;
                img.style.display = "block";
                document.getElementById('no-logo-text').style.display = "none";
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function loadCurrentData() {
        const { data, error } = await _sb.from('companies').select('*').eq('id', companyId).single();
        if (error) return;

        if (data) {
            document.getElementById('biz-name').value = data.company_name || '';
            document.getElementById('biz-tin').value = data.tin_number || '';
            document.getElementById('biz-addr').value = data.company_address || '';
            document.getElementById('biz-phone').value = data.contact_number || '';
            document.getElementById('biz-email').value = data.business_email || ''; // Updated column name
            
            if (data.logo_url) {
                currentLogoUrl = data.logo_url;
                const img = document.getElementById('logo-img');
                img.src = `${data.logo_url}?t=${new Date().getTime()}`;
                img.style.display = "block";
                document.getElementById('no-logo-text').style.display = "none";
            }
        }
    }

    async function saveSettings() {
        const btn = document.getElementById('save-btn');
        const logoFile = document.getElementById('logo-input').files[0];
        btn.innerText = "⏳ SAVING...";
        btn.disabled = true;

        let finalLogoUrl = currentLogoUrl;

        if (logoFile) {
            const fileExt = logoFile.name.split('.').pop();
            const fileName = `logo_${companyId}.${fileExt}`;
            
            const { data: uploadData, error: uploadError } = await _sb.storage
                .from('jmcyflow')
                .upload(fileName, logoFile, { upsert: true, contentType: logoFile.type });

            if (!uploadError) {
                const { data: publicData } = _sb.storage.from('jmcyflow').getPublicUrl(fileName);
                finalLogoUrl = publicData.publicUrl;
            }
        }
        
        const updates = {
            company_name: document.getElementById('biz-name').value.toUpperCase(),
            tin_number: document.getElementById('biz-tin').value.toUpperCase(),
            company_address: document.getElementById('biz-addr').value.toUpperCase(),
            contact_number: document.getElementById('biz-phone').value,
            business_email: document.getElementById('biz-email').value.toLowerCase(), // Updated column name
            logo_url: finalLogoUrl
        };

        const { error } = await _sb.from('companies').update(updates).eq('id', companyId);

        if(!error) {
            alert("Settings Updated Successfully!");
            localStorage.setItem('jmcy_company_name', updates.company_name);
            localStorage.setItem('jmcy_logo', finalLogoUrl);
            document.getElementById('logo-img').src = `${finalLogoUrl}?t=${new Date().getTime()}`;
        } else {
            alert("Error: " + error.message);
        }
        
        btn.innerText = "💾 SAVE ALL CHANGES";
        btn.disabled = false;
    }
</script>

</body>
</html>
