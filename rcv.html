<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RECEIVING PORTAL | JMCYFLOW</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; --success: #10b981; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 16px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: #94a3b8; border-left: 4px solid transparent; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: white; border-left-color: var(--accent); font-weight: 700; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding: 25px; }

        /* --- TRANSACTION HEADER --- */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .ref-badge { background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; border-left: 4px solid var(--accent); }
        .ref-label { font-size: 0.6rem; opacity: 0.7; display: block; margin-bottom: 2px; }
        .ref-no { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; }

        /* --- FORM GRID --- */
        .form-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; outline: none; }
        input:focus { border-color: var(--accent); }

        /* --- ITEM SELECTOR --- */
        .selector-box { background: #f0f7ff; padding: 20px; border-radius: 12px; border: 1px solid #c3dafe; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        /* --- TABLE --- */
        .table-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; font-size: 0.7rem; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); text-align: left; }
        td { padding: 12px; font-size: 0.8rem; border-bottom: 1px solid #f1f5f9; border-right: 1px solid var(--border); }
        .btn-del { color: #ef4444; cursor: pointer; border: none; background: none; font-weight: 800; }

        .btn-post { width: 100%; margin-top: 20px; background: var(--success); color: white; border: none; padding: 18px; border-radius: 10px; font-size: 1rem; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 65px; position: fixed; bottom: 0; flex-direction: row; }
            .nav-item { flex: 1; flex-direction: column; padding: 10px; font-size: 0.5rem; border: none; }
            .main { height: calc(100vh - 65px); }
            .form-card, .selector-box { grid-template-columns: 1fr; flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="nav-item" onclick="location.href='inventory.html'">📋 <span>LIST</span></div>
    <div class="nav-item active">📥 <span>RCV</span></div>
    <div class="nav-item">📤 <span>OUT</span></div>
    <div class="nav-item">📜 <span>HIST</span></div>
</aside>

<main class="main">
    <div class="content-area">
        <div class="header-section">
            <div class="ref-badge">
                <span class="ref-label">TRANSACTION REFERENCE</span>
                <span id="displayRef" class="ref-no">LOADING...</span>
            </div>
            <div class="field" style="width: 200px;">
                <label>Staff In-Charge</label>
                <input type="text" id="staffName" placeholder="YOUR NAME" style="background: #fffbeb; border-color: #fde68a;">
            </div>
        </div>

        <div class="form-card">
            <div class="field">
                <label>Supplier Name</label>
                <input type="text" id="supplier" placeholder="VENDOR NAME">
            </div>
            <div class="field">
                <label>Delivery Receipt #</label>
                <input type="text" id="drNum" placeholder="MANUAL DR NO.">
            </div>
            <div class="field">
                <label>Date Received</label>
                <input type="date" id="dateRcv">
            </div>
            <div class="field">
                <label>Remarks</label>
                <input type="text" id="remarks" placeholder="OPTIONAL NOTES">
            </div>
        </div>

        <div class="selector-box">
            <div class="field" style="flex:3">
                <label>Search Item (SKU or Description)</label>
                <input type="text" id="itemSearch" list="itemDataset" placeholder="START TYPING..." oninput="handleSearch(this.value)">
                <datalist id="itemDataset"></datalist>
            </div>
            <div class="field" style="flex:1">
                <label>Quantity</label>
                <input type="number" id="qtyInput" value="1" min="1">
            </div>
            <button class="btn-add" onclick="addItem()">ADD TO LIST</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th style="width:50px">#</th>
                        <th>SKU / Code</th>
                        <th>Item Description</th>
                        <th>Qty</th>
                        <th>UoM</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="stagingBody">
                    <tr><td colspan="6" style="text-align:center; padding:40px; color:#94a3b8;">NO ITEMS SELECTED</td></tr>
                </tbody>
            </table>
        </div>

        <button class="btn-post" onclick="submitTransaction()">POST RECEIVING & UPDATE HISTORY</button>
    </div>
</main>

<script>
    const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');
    
    let inventoryData = [];
    let cart = [];
    let selectedRow = null;
    const companyID = localStorage.getItem('jmcy_cid');

    async function init() {
        if(!companyID) { location.href='portal.html'; return; }
        document.getElementById('dateRcv').valueAsDate = new Date();
        
        // Fetch new dynamic Reference Number (RCV prefix)
        const { data: refNum } = await _sb.rpc('generate_inventory_ref', { prefix_input: 'RCV' });
        document.getElementById('displayRef').innerText = refNum || 'REF-ERROR';

        const { data } = await _sb.from('inventory').select('*').eq('company_id', companyID);
        inventoryData = data || [];
        document.getElementById('itemDataset').innerHTML = inventoryData.map(i => `<option value="${i.sku}">${i.item_nam}</option>`).join('');
    }

    function handleSearch(val) {
        selectedRow = inventoryData.find(i => i.sku === val);
    }

    function addItem() {
        const qty = parseInt(document.getElementById('qtyInput').value);
        if(!selectedRow || qty <= 0) { alert("PLEASE SELECT A VALID ITEM"); return; }
        
        cart.push({ ...selectedRow, move_qty: qty });
        renderTable();
        document.getElementById('itemSearch').value = '';
        selectedRow = null;
    }

    function renderTable() {
        const tbody = document.getElementById('stagingBody');
        if(cart.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">NO ITEMS SELECTED</td></tr>';
            return;
        }
        tbody.innerHTML = cart.map((item, idx) => `
            <tr>
                <td>${idx + 1}</td>
                <td style="font-weight:700; color:var(--accent)">${item.sku}</td>
                <td><b>${item.item_nam}</b><br><small style="color:#64748b">${item.brand || ''}</small></td>
                <td style="font-weight:800;">${item.move_qty}</td>
                <td>${item.uom}</td>
                <td><button class="btn-del" onclick="remove(${idx})">REMOVE</button></td>
            </tr>
        `).join('');
    }

    function remove(idx) { cart.splice(idx, 1); renderTable(); }

    async function submitTransaction() {
        const staff = document.getElementById('staffName').value.trim();
        if(!staff) { alert("PLEASE ENTER STAFF NAME"); return; }
        if(cart.length === 0) return;

        const confirmSubmit = confirm("POST THIS TO INVENTORY?");
        if(!confirmSubmit) return;

        const ref = document.getElementById('displayRef').innerText;

        for (const item of cart) {
            // 1. Update Inventory Table (Stock Up)
            const updatedQty = (item.stock_qty || 0) + item.move_qty;
            await _sb.from('inventory').update({ stock_qty: updatedQty }).eq('id', item.id);

            // 2. Insert into History (matching your screenshot columns)
            await _sb.from('inventory_history').insert({
                company_id: companyID,
                sku: item.sku,
                item_nam: item.item_nam,
                brand: item.brand,
                uom: item.uom,
                action_type: 'RECEIVE', // The transaction label
                type: 'IN',
                qty_change: item.move_qty,
                location: item.location || 'MAIN',
                performed_by: staff, // Recorded to your Supabase table
                material: item.material,
                category: item.category,
                // Linking the reference number for tracking
                log_date: document.getElementById('dateRcv').value,
                material: "REF: " + ref + " | " + document.getElementById('remarks').value
            });
        }

        alert("POSTED SUCCESSFULLY. REF: " + ref);
        location.reload();
    }

    window.onload = init;
</script>
</body>
</html>
