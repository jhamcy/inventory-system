<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RECEIVING PORTAL | JMCYFLOW</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --border: #e2e8f0; 
            --text: #1e293b; --sidebar-text: #94a3b8; --danger: #ef4444; --success: #10b981; --white: #ffffff;
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR (DESKTOP) --- */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; z-index: 1000; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 16px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: var(--sidebar-text); transition: 0.2s; border-left: 4px solid transparent; text-decoration: none; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: white; border-left-color: var(--accent); font-weight: 700; }

        /* --- MAIN --- */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { height: 65px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0; }
        #nav-logo { max-height: 28px; width: auto; margin-right: 10px; }

        .content-area { flex: 1; overflow-y: auto; padding: 20px; }

        /* --- TRANSACTION HEADER --- */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .ref-badge { background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; border-left: 4px solid var(--accent); min-width: 200px; }
        .ref-label { font-size: 0.6rem; opacity: 0.7; display: block; margin-bottom: 2px; }
        .ref-no { font-size: 1.1rem; font-weight: 800; letter-spacing: 1px; }

        /* --- FORM CARDS --- */
        .form-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; }
        input, select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.8rem; outline: none; }
        
        /* --- SELECTOR --- */
        .selector-box { background: #f0f7ff; padding: 20px; border-radius: 12px; border: 1px solid #c3dafe; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { background: #2563eb; }

        /* --- TABLE --- */
        .table-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; font-size: 0.7rem; border-bottom: 1px solid var(--border); text-align: left; color: #64748b; }
        td { padding: 12px; font-size: 0.8rem; border-bottom: 1px solid #f1f5f9; }
        .btn-del { color: var(--danger); cursor: pointer; border: none; background: none; font-weight: 800; font-size: 0.7rem; }

        .btn-post { width: 100%; margin-top: 25px; background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: 900; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); transition: 0.3s; }
        .btn-post:active { transform: scale(0.98); }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: 60px; flex-direction: row; flex-shrink: 0;
                border-bottom: 1px solid rgba(255,255,255,0.1); 
            }
            .sidebar-header { display: none; }
            .nav-item { 
                flex: 1; padding: 0; font-size: 0.65rem; border-left: none; 
                border-bottom: 3px solid transparent; justify-content: center; 
                flex-direction: column; gap: 4px;
            }
            .nav-item.active { border-bottom-color: var(--accent); background: transparent; }
            
            .main { height: 100vh; display: flex; flex-direction: column; }
            .content-area { padding: 15px; flex: 1; overflow-y: auto; }
            .header-section { flex-direction: column; align-items: stretch; }
            .ref-badge { width: 100%; }
            .selector-box { flex-direction: column; align-items: stretch; }
            
            table, thead, tbody, th, td, tr { display: block; border: none; }
            thead { display: none; }
            tr { background: white; margin-bottom: 12px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
            td { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f8fafc; }
            td:before { content: attr(data-label); font-weight: 800; color: #64748b; font-size: 0.6rem; }
            td:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header"><h2 style="margin:0; font-size: 1.1rem; color: white;">WHSE <span style="color:var(--accent)">PRO</span></h2></div>
    <div class="nav-item" onclick="location.href='inventory.html'">📋 <span>LIST</span></div>
    <div class="nav-item active" onclick="location.href='rcv.html'">📥 <span>RCV</span></div>
    <div class="nav-item" onclick="location.href='out.html'">📤 <span>OUT</span></div>
    <div class="nav-item" onclick="location.href='hist.html'">📜 <span>HIST</span></div>
</aside>

<div class="main">
    <header class="top-header">
        <div style="display:flex; align-items:center;">
            <img id="nav-logo" src="" style="display:none;">
            <span id="nav-text" style="font-weight:800; letter-spacing:1px;">---</span>
        </div>
        <button style="border:none; background:#fef2f2; color:var(--danger); padding:8px 15px; border-radius:6px; font-weight:800; font-size:0.65rem; cursor:pointer;" onclick="localStorage.clear(); location.href='portal.html'">LOGOUT</button>
    </header>

    <main class="content-area">
        <div class="header-section">
            <div class="ref-badge">
                <span class="ref-label">TRANSACTION REFERENCE</span>
                <span id="displayRef" class="ref-no">LOADING...</span>
            </div>
            <div class="field" style="flex:1; min-width: 200px;">
                <label>Staff In-Charge</label>
                <input type="text" id="staffName" placeholder="YOUR NAME" style="background: #fffbeb; border-color: #fde68a;">
            </div>
        </div>

        <div class="form-card">
            <div class="field">
                <label>Supplier Name</label>
                <input type="text" id="supplier" placeholder="VENDOR NAME">
            </div>
            <div class="field">
                <label>Delivery Receipt #</label>
                <input type="text" id="drNum" placeholder="MANUAL DR NO.">
            </div>
            <div class="field">
                <label>Date Received</label>
                <input type="date" id="dateRcv">
            </div>
            <div class="field">
                <label>Remarks</label>
                <input type="text" id="remarks" placeholder="OPTIONAL NOTES">
            </div>
        </div>

        <div class="selector-box">
            <div class="field" style="flex:3; min-width: 200px;">
                <label>Search Item (SKU or Description)</label>
                <input type="text" id="itemSearch" list="itemDataset" placeholder="START TYPING..." oninput="handleSearch(this.value)">
                <datalist id="itemDataset"></datalist>
            </div>
            <div class="field" style="flex:1; min-width: 100px;">
                <label>Quantity</label>
                <input type="number" id="qtyInput" value="1" min="1">
            </div>
            <button class="btn-add" onclick="addItem()">ADD TO LIST</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>SKU / Code</th>
                        <th>Item Description</th>
                        <th>Qty</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="stagingBody">
                    <tr><td colspan="4" style="text-align:center; padding:40px; color:#94a3b8;">NO ITEMS SELECTED</td></tr>
                </tbody>
            </table>
        </div>

        <button class="btn-post" onclick="submitTransaction()">POST RECEIVING & UPDATE HISTORY</button>
    </main>
</div>

<script>
    const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');
    
    let inventoryData = [];
    let cart = [];
    let selectedRow = null;
    const companyID = localStorage.getItem('jmcy_cid');

    async function init() {
        if(!companyID) { location.href='portal.html'; return; }
        document.getElementById('dateRcv').valueAsDate = new Date();
        
        const { data: comp } = await _sb.from('companies').select('*').eq('id', companyID).single();
        if(comp) {
            document.getElementById('nav-text').innerText = comp.company_name;
            if(comp.logo_url) {
                const logo = document.getElementById('nav-logo');
                logo.src = comp.logo_url; logo.style.display = 'block';
            }
        }

        const { data: refNum } = await _sb.rpc('generate_inventory_ref', { prefix_input: 'RCV' });
        document.getElementById('displayRef').innerText = refNum || 'REF-ERROR';

        const { data } = await _sb.from('inventory').select('*').eq('company_id', companyID);
        inventoryData = data || [];
        document.getElementById('itemDataset').innerHTML = inventoryData.map(i => `<option value="${i.sku}">${i.item_nam}</option>`).join('');
    }

    function handleSearch(val) {
        selectedRow = inventoryData.find(i => i.sku === val);
    }

    function addItem() {
        const qty = parseInt(document.getElementById('qtyInput').value);
        if(!selectedRow || qty <= 0) { alert("PLEASE SELECT A VALID ITEM"); return; }
        
        cart.push({ ...selectedRow, move_qty: qty });
        renderTable();
        document.getElementById('itemSearch').value = '';
        selectedRow = null;
    }

    function renderTable() {
        const tbody = document.getElementById('stagingBody');
        if(cart.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">NO ITEMS SELECTED</td></tr>';
            return;
        }
        tbody.innerHTML = cart.map((item, idx) => `
            <tr>
                <td data-label="SKU" style="font-weight:700; color:var(--accent)">${item.sku}</td>
                <td data-label="Item"><b>${item.item_nam}</b></td>
                <td data-label="Qty" style="font-weight:800;">${item.move_qty}</td>
                <td data-label="Action"><button class="btn-del" onclick="remove(${idx})">REMOVE</button></td>
            </tr>
        `).join('');
    }

    function remove(idx) { cart.splice(idx, 1); renderTable(); }

    async function submitTransaction() {
        const staff = document.getElementById('staffName').value.trim();
        if(!staff) { alert("PLEASE ENTER STAFF NAME"); return; }
        if(cart.length === 0) return;

        const confirmSubmit = confirm("POST THIS TO INVENTORY?");
        if(!confirmSubmit) return;

        const ref = document.getElementById('displayRef').innerText;

        for (const item of cart) {
            const updatedQty = (item.stock_qty || 0) + item.move_qty;
            await _sb.from('inventory').update({ stock_qty: updatedQty }).eq('id', item.id);

            await _sb.from('inventory_history').insert({
                company_id: companyID,
                sku: item.sku,
                item_nam: item.item_nam,
                brand: item.brand,
                uom: item.uom,
                action_type: 'RECEIVE',
                type: 'IN',
                qty_change: item.move_qty,
                location: item.location || 'MAIN',
                performed_by: staff,
                log_date: document.getElementById('dateRcv').value,
                material: "REF: " + ref + " | " + document.getElementById('remarks').value
            });
        }

        alert("POSTED SUCCESSFULLY. REF: " + ref);
        location.reload();
    }

    window.onload = init;
</script>
</body>
</html>
