<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Portal | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; 
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #portal-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: 0.3s;
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        .company-header h2 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: -1px; font-weight: 800; }
        .company-header span { color: var(--primary); }
        .status-badge { font-size: 0.65rem; text-transform: uppercase; color: #fbbf24; margin-bottom: 25px; display: block; letter-spacing: 1.5px; font-weight: 700; }

        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; margin-bottom: 8px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        #portalSearch { text-transform: uppercase; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        #login-section { display: none; margin-top: 20px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .btn-action:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn-action:disabled { opacity: 0.5; cursor: wait; }

        .reset-btn { background: none; border: none; color: var(--text-dim); font-size: 0.75rem; cursor: pointer; margin-top: 15px; text-decoration: underline; }
        
        .back-home {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-decoration: none;
            transition: 0.3s;
        }
        .back-home:hover { color: var(--primary); }

        #toast {
            position: fixed;
            top: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            transform: translateY(-100px);
            transition: 0.4s;
            z-index: 1000;
            font-weight: 600;
            font-size: 0.9rem;
        }
        #toast.show { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="toast">⚠️ Message here</div>

    <div id="portal-card">
        <div class="company-header">
            <h2 id="display-title">Jmcy<span>Flow</span></h2>
            <span class="status-badge" id="status-text">Gateway Terminal</span>
        </div>
        
        <!-- STEP 1: PORTAL DISCOVERY -->
        <div id="search-section">
            <div class="form-group">
                <label>Portal ID</label>
                <input type="text" id="portalSearch" placeholder="ENTER YOUR COMPANY ID">
            </div>
            <button class="btn-action" id="find-btn" onclick="lookupCompany()">Verify Portal</button>
            <a href="index.html" class="back-home">← Return to Index</a>
        </div>

        <!-- STEP 2: CREDENTIALS -->
        <div id="login-section">
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="user" placeholder="Enter Username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="pass" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-action" id="login-btn">Authorize Access</button>
            </form>
            <button class="reset-btn" onclick="location.reload()">Change Portal ID</button>
        </div>

        <p style="margin-top: 30px; font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">
            Secure Managed Instance • 2026
        </p>
    </div>

    <script>
        const _supabase = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');
        
        let activeCompany = null;

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if(id) {
                document.getElementById('portalSearch').value = id.toUpperCase();
                lookupCompany();
            }
        };

        function showNotification(msg, type = "error") {
            const toast = document.getElementById('toast');
            toast.style.background = type === "error" ? "var(--error)" : "var(--success)";
            toast.innerText = (type === "error" ? "⚠️ " : "✅ ") + msg;
            toast.classList.add('show');
            if(type === "error") document.getElementById('portal-card').classList.add('shake');
            
            setTimeout(() => {
                toast.classList.remove('show');
                document.getElementById('portal-card').classList.remove('shake');
            }, 3000);
        }

        async function lookupCompany() {
            const input = document.getElementById('portalSearch');
            const query = input.value.toUpperCase().trim();
            if(!query) return;

            const btn = document.getElementById('find-btn');
            btn.disabled = true;
            btn.innerText = "Finding Portal...";
            
            try {
                const { data, error } = await _supabase
                    .from('companies')
                    .select('*')
                    .eq('portal_id', query)
                    .maybeSingle();

                if (data) {
                    activeCompany = data;
                    revealLogin(data);
                } else {
                    // This satisfies the "not exist" notification requirement
                    showNotification("Portal ID does not exist.", "error");
                    btn.disabled = false;
                    btn.innerText = "Verify Portal";
                }
            } catch (err) {
                showNotification("Connection error.");
                btn.disabled = false;
                btn.innerText = "Verify Portal";
            }
        }

        function revealLogin(company) {
            document.getElementById('display-title').innerText = company.company_name;
            document.documentElement.style.setProperty('--primary', company.theme_color || '#3b82f6');
            document.getElementById('status-text').innerText = "Verified • Encrypted Connection";
            document.getElementById('search-section').style.display = "none";
            document.getElementById('login-section').style.display = "block";
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            btn.innerText = "Authenticating...";

            try {
                // Ensure table and column names match your registration logic (staff_members / password)
                const { data: user, error } = await _supabase
                    .from('staff_members')
                    .select('*')
                    .eq('company_id', activeCompany.id)
                    .eq('username', u.toUpperCase())
                    .eq('password', p.toUpperCase()) 
                    .maybeSingle();

                if (user) {
                    saveAndRedirect(activeCompany.portal_id, user.username, user.role, activeCompany.company_name);
                } else {
                    showNotification("Invalid Credentials.");
                    btn.disabled = false;
                    btn.innerText = "Authorize Access";
                }
            } catch (err) {
                showNotification("Verification error.");
                btn.disabled = false;
                btn.innerText = "Authorize Access";
            }
        });

        function saveAndRedirect(portalId, username, role, companyName) {
            localStorage.setItem('jmcy_portal_id', portalId.toUpperCase());
            localStorage.setItem('jmcy_user_role', role);
            localStorage.setItem('jmcy_username', username);
            localStorage.setItem('jmcy_company_name', companyName);
            
            showNotification("Access Granted. Routing...", "success");

            setTimeout(() => {
                if (role === 'OWNER' || role === 'admin') {
                    window.location.href = "portal.html"; 
                } else if (role === 'sales') {
                    window.location.href = "sales.html";
                } else {
                    window.location.href = "inventory.html"; 
                }
            }, 1000);
        }
    </script>
</body>
</html>
