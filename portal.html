<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Portal | JmcyFlow</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; 
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #portal-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        .company-header h2 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: -1px; }
        .status-badge { font-size: 0.7rem; text-transform: uppercase; color: #fbbf24; margin-bottom: 25px; display: block; letter-spacing: 1px; }

        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: var(--text-dim); font-weight: 600; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        #login-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-action:disabled { opacity: 0.5; cursor: wait; }

        #toast {
            position: fixed;
            top: 20px;
            right: -300px;
            background: var(--error);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            transition: 0.5s;
            z-index: 1000;
        }
        #toast.show { right: 20px; }
    </style>
</head>
<body>

    <div id="toast">⚠️ Message here</div>

    <div id="portal-card">
        <div class="company-header">
            <h2 id="display-title">Jmcy<span>Flow</span></h2>
            <span class="status-badge" id="status-text">Gateway Terminal</span>
        </div>
        
        <div id="search-section">
            <div class="form-group">
                <label>Enter Portal ID</label>
                <input type="text" id="portalSearch" placeholder="e.g. acme-logistics">
            </div>
            <button class="btn-action" id="find-btn" onclick="lookupCompany()">Verify Portal</button>
        </div>

        <div id="login-section">
            <form id="loginForm">
                <div class="form-group">
                    <label>Admin Username</label>
                    <input type="text" id="user" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="pass" required>
                </div>
                <button type="submit" class="btn-action" id="login-btn">Authorize Access</button>
            </form>
        </div>

        <p style="margin-top: 25px; font-size: 0.7rem; color: var(--text-dim);">
            Powered by Jmcy Web Solutions
        </p>
    </div>

    <script>
        const SUPABASE_URL = "https://pehffyqlssrqogosfsab.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s";
        
        // FIXED: Renamed to _supabase
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeCompany = null;

        // On Load: Check if ID is already in URL (from registration redirect)
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if(id) {
                document.getElementById('portalSearch').value = id;
                lookupCompany();
            }
        };

        function showNotification(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = "⚠️ " + msg;
            toast.classList.add('show');
            document.getElementById('portal-card').classList.add('shake');
            setTimeout(() => {
                toast.classList.remove('show');
                document.getElementById('portal-card').classList.remove('shake');
            }, 3000);
        }

        async function lookupCompany() {
            const input = document.getElementById('portalSearch');
            const query = input.value.toLowerCase().trim();
            const findBtn = document.getElementById('find-btn');

            if(!query) return;

            findBtn.disabled = true;
            findBtn.innerText = "Searching...";
            
            try {
                const { data, error } = await _supabase
                    .from('companies')
                    .select('*')
                    .eq('portal_id', query)
                    .maybeSingle(); // Better than .single() as it doesn't throw error on 0 results

                if (data) {
                    activeCompany = data;
                    revealLogin(data);
                } else {
                    showNotification("Portal ID not registered.");
                    findBtn.disabled = false;
                    findBtn.innerText = "Verify Portal";
                }
            } catch (err) {
                showNotification("Database Error.");
                findBtn.disabled = false;
                findBtn.innerText = "Verify Portal";
            }
        }

        function revealLogin(company) {
            document.getElementById('display-title').innerHTML = company.company_name.toUpperCase();
            document.documentElement.style.setProperty('--primary', company.theme_color || '#3b82f6');
            document.getElementById('status-text').innerText = "Portal Verified • Secure Access";
            document.getElementById('search-section').style.display = "none";
            document.getElementById('login-section').style.display = "block";
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            if (u === activeCompany.admin_user && p === activeCompany.admin_pass) {
                // SAVE SESSION DATA FOR OTHER PAGES
                localStorage.setItem('jmcy_cid', activeCompany.portal_id);
                localStorage.setItem('jmcy_user', u);
                localStorage.setItem('jmcy_role', 'ADMIN');
                
                window.location.href = "inventory.html";
            } else {
                showNotification("Invalid Admin Credentials.");
            }
        });
    </script>
</body>
</html>
