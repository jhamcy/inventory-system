<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Gateway | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6; 
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .gateway-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .header h2 { font-size: 1.8rem; margin-bottom: 8px; font-weight: 800; }
        .header span { color: var(--primary); }
        
        .form-group { text-align: left; margin-top: 25px; margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 8px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        input {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            text-transform: uppercase; /* Visual uppercase */
        }

        input:focus { border-color: var(--primary); }

        .btn-verify {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .btn-verify:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        #msg { margin-top: 15px; font-size: 0.8rem; color: var(--error); display: none; }
    </style>
</head>
<body>

    <div class="gateway-card">
        <div class="header">
            <h2>Jmcy<span>Flow</span></h2>
            <p style="color: var(--text-dim); font-size: 0.8rem;">Enter Portal ID to Continue</p>
        </div>

        <div class="form-group">
            <label>Portal ID</label>
            <!-- Force actual value to Uppercase while typing -->
            <input type="text" id="portalInput" placeholder="E.G. MY-BUSINESS-01" oninput="this.value = this.value.toUpperCase()">
        </div>

        <button class="btn-verify" id="goBtn" onclick="verifyAndRedirect()">Verify Portal</button>
        <p id="msg"></p>

        <a href="register.html" style="display:block; margin-top:25px; color:var(--text-dim); text-decoration:none; font-size:0.7rem;">Create New Portal</a>
    </div>

    <script>
        const _supabase = supabase.createClient("https://pehffyqlssrqogosfsab.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s");

        async function verifyAndRedirect() {
            const id = document.getElementById('portalInput').value.trim();
            const btn = document.getElementById('goBtn');
            const msg = document.getElementById('msg');

            if(!id) return;

            btn.disabled = true;
            btn.innerText = "Searching...";
            msg.style.display = "none";

            try {
                // Check if the portal exists
                const { data, error } = await _supabase
                    .from('companies')
                    .select('portal_id')
                    .eq('portal_id', id)
                    .maybeSingle();

                if (data) {
                    // Success: Send them to login.html WITH the ID in the URL
                    window.location.href = `login.html?id=${data.portal_id}`;
                } else {
                    msg.innerText = "Portal ID not found. Please check and try again.";
                    msg.style.display = "block";
                    btn.disabled = false;
                    btn.innerText = "Verify Portal";
                }
            } catch (err) {
                msg.innerText = "Connection error. Try again.";
                msg.style.display = "block";
                btn.disabled = false;
            }
        }

        // Allow "Enter" key to submit
        document.getElementById('portalInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyAndRedirect();
        });
    </script>
</body>
</html>
