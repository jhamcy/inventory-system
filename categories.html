<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATEGORY MANAGEMENT | JMCYFLOW</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; --danger: #ef4444; --success: #10b981; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .nav { height: 60px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        .back-link { color: var(--accent); text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        .main-layout { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .container { max-width: 800px; margin: 0 auto; width: 100%; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; font-weight: 800; margin: 0; text-transform: uppercase; color: var(--primary); }

        .category-card { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 15px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .category-card:hover { border-color: var(--accent); transform: translateX(5px); }
        .cat-info h3 { margin: 0; font-size: 0.95rem; font-weight: 700; color: var(--primary); }
        .cat-info p { margin: 2px 0 0; font-size: 0.75rem; color: #64748b; font-weight: 500; }

        .btn { padding: 10px 18px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 0.75rem; transition: 0.2s; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-delete { background: #fee2e2; color: var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal { background: white; padding: 25px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal h2 { margin-top: 0; font-size: 1rem; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; }
        label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        input:focus { border-color: var(--accent); }

        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="dashboard.html" class="back-link">← DASHBOARD</a>
    <div style="font-weight: 800; font-size: 0.75rem; color: #64748b;">CATEGORY MANAGER</div>
</nav>

<div class="main-layout">
    <div class="container">
        <div class="header-section">
            <h1>Product Categories</h1>
            <button class="btn btn-add" onclick="toggleModal(true)">+ New Category</button>
        </div>

        <div id="category-list">
            <div class="empty-state">Loading categories...</div>
        </div>
    </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h2>Add Category</h2>
        <div class="form-group">
            <label>Category Name</label>
            <input type="text" id="new-cat-name" placeholder="e.g. Beverages, Electronics">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn" style="background: #e2e8f0; flex: 1;" onclick="toggleModal(false)">Cancel</button>
            <button class="btn btn-add" style="flex: 2; justify-content: center;" onclick="addCategory()">Save Category</button>
        </div>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');
    
    const cid = localStorage.getItem('jmcy_cid');

    window.onload = () => {
        if (!cid) { window.location.href = 'login.html'; return; }
        fetchCategories();
    };

    function toggleModal(show) {
        document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none';
        if(show) document.getElementById('new-cat-name').focus();
    }

    async function fetchCategories() {
        const listDiv = document.getElementById('category-list');
        
        const { data, error } = await _sb
            .from('categories')
            .select('*')
            .eq('company_id', cid)
            .order('name', { ascending: true });

        if (error) {
            listDiv.innerHTML = `<div class="empty-state">Error loading data.</div>`;
            return;
        }

        if (data.length === 0) {
            listDiv.innerHTML = `<div class="empty-state">No categories found. Click "New Category" to begin.</div>`;
            return;
        }

        listDiv.innerHTML = data.map(cat => `
            <div class="category-card">
                <div class="cat-info">
                    <h3>${cat.name}</h3>
                    <p>ID: ${cat.id.substring(0,8)}</p>
                </div>
                <button class="btn btn-delete" onclick="deleteCategory('${cat.id}', '${cat.name}')">Delete</button>
            </div>
        `).join('');
    }

    async function addCategory() {
        const name = document.getElementById('new-cat-name').value.trim();
        if (!name) return;

        const { error } = await _sb
            .from('categories')
            .insert([{ name: name, company_id: cid }]);

        if (!error) {
            document.getElementById('new-cat-name').value = '';
            toggleModal(false);
            fetchCategories();
        } else {
            alert("Error: " + error.message);
        }
    }

    async function deleteCategory(id, name) {
        if (!confirm(`Are you sure you want to delete "${name}"? This may affect items assigned to this category.`)) return;

        const { error } = await _sb
            .from('categories')
            .delete()
            .eq('id', id);

        if (!error) {
            fetchCategories();
        } else {
            alert("Error: Cannot delete category while it is in use.");
        }
    }
</script>

</body>
</html>
