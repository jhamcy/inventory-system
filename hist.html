<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANSACTION HISTORY | JMCYFLOW</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --border: #e2e8f0; 
            --text: #1e293b; --sidebar-text: #94a3b8; --danger: #ef4444; --in: #10b981; --white: #ffffff;
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; text-transform: uppercase; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR (DESKTOP) --- */
        .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; z-index: 1000; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-item { padding: 16px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 0.8rem; color: var(--sidebar-text); transition: 0.2s; border-left: 4px solid transparent; text-decoration: none; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: white; border-left-color: var(--accent); font-weight: 700; }

        /* --- MAIN --- */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { height: 65px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0; }
        #nav-logo { max-height: 28px; width: auto; margin-right: 10px; }

        .content-area { flex: 1; overflow-y: auto; padding: 20px; }

        /* --- FILTERS --- */
        .filter-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 15px; align-items: flex-end; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.6rem; font-weight: 800; color: #64748b; }
        input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.75rem; outline: none; }

        /* --- TABLE --- */
        .table-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .table-responsive { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f1f5f9; padding: 14px; font-size: 0.65rem; font-weight: 800; border-bottom: 1px solid var(--border); text-align: left; position: sticky; top: 0; color: #475569; }
        td { padding: 12px; font-size: 0.75rem; border-bottom: 1px solid #f1f5f9; }
        
        .type-in { color: var(--in); font-weight: 800; }
        .type-out { color: var(--danger); font-weight: 800; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 800; background:#f1f5f9; border:1px solid #cbd5e1; }

        /* --- MOBILE LAYOUT --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: 60px; flex-direction: row; flex-shrink: 0;
                border-bottom: 1px solid rgba(255,255,255,0.1); 
            }
            .sidebar-header { display: none; }
            .nav-item { 
                flex: 1; padding: 0; font-size: 0.65rem; border-left: none; 
                border-bottom: 3px solid transparent; justify-content: center; 
                flex-direction: column; gap: 4px;
            }
            .nav-item.active { border-bottom-color: var(--accent); background: transparent; }
            
            .main { height: 100vh; display: flex; flex-direction: column; }
            .content-area { padding: 15px; flex: 1; overflow-y: auto; }
            .filter-card { grid-template-columns: 1fr; padding: 15px; }
            
            /* In history, we keep the table horizontal scroll for data density, 
               but you can still view it easily on mobile */
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-header"><h2 style="margin:0; font-size: 1.1rem; color: white;">WHSE <span style="color:var(--accent)">PRO</span></h2></div>
    <div class="nav-item" onclick="location.href='inventory.html'">📋 <span>LIST</span></div>
    <div class="nav-item" onclick="location.href='rcv.html'">📥 <span>RCV</span></div>
    <div class="nav-item" onclick="location.href='out.html'">📤 <span>OUT</span></div>
    <div class="nav-item active" onclick="location.href='hist.html'">📜 <span>HIST</span></div>
</aside>

<div class="main">
    <header class="top-header">
        <div style="display:flex; align-items:center;">
            <img id="nav-logo" src="" style="display:none;">
            <span id="nav-text" style="font-weight:800; letter-spacing:1px;">---</span>
        </div>
        <button style="border:none; background:#fef2f2; color:var(--danger); padding:8px 15px; border-radius:6px; font-weight:800; font-size:0.65rem; cursor:pointer;" onclick="localStorage.clear(); location.href='portal.html'">LOGOUT</button>
    </header>

    <main class="content-area">
        <h2 style="margin-top:0; font-weight:800; letter-spacing: -0.5px; font-size: 1.2rem;">INVENTORY <span style="color:var(--accent)">AUDIT LOG</span></h2>

        <div class="filter-card">
            <div class="field">
                <label>Search SKU, Item, or Ref#</label>
                <input type="text" id="globalSearch" placeholder="SEARCH ANYTHING..." onkeyup="applyFilters()">
            </div>
            <div class="field">
                <label>Flow Type</label>
                <select id="flowFilter" onchange="applyFilters()">
                    <option value="ALL">ALL FLOWS</option>
                    <option value="IN">STOCK IN (+)</option>
                    <option value="OUT">STOCK OUT (-)</option>
                </select>
            </div>
            <div class="field">
                <label>Action Category</label>
                <select id="actionFilter" onchange="applyFilters()">
                    <option value="ALL">ALL ACTIONS</option>
                    <option value="RECEIVE">RECEIVE</option>
                    <option value="TRANSFER">TRANSFER</option>
                    <option value="INTERNAL USE">INTERNAL USE</option>
                    <option value="DAMAGE">DAMAGE</option>
                    <option value="DEFECTIVE">DEFECTIVE</option>
                    <option value="EXPIRED">EXPIRED</option>
                </select>
            </div>
            <button onclick="fetchHistory()" style="padding:10px 20px; border-radius:8px; border:none; background:var(--primary); color:white; font-weight:800; cursor:pointer;">REFRESH</button>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Log Date</th>
                            <th>SKU / Code</th>
                            <th>Item Name</th>
                            <th>Action</th>
                            <th>Flow</th>
                            <th>Qty</th>
                            <th>Performed By</th>
                            <th>Reference & Notes</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="8" style="text-align:center; padding:50px; color:#94a3b8;">LOADING LOGS...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');
    
    let fullHistory = [];
    const companyID = localStorage.getItem('jmcy_cid');

    async function init() {
        if(!companyID) { location.href='portal.html'; return; }
        
        // Load Company Info
        const { data: comp } = await _sb.from('companies').select('*').eq('id', companyID).single();
        if(comp) {
            document.getElementById('nav-text').innerText = comp.company_name;
            if(comp.logo_url) {
                const logo = document.getElementById('nav-logo');
                logo.src = comp.logo_url; logo.style.display = 'block';
            }
        }
        fetchHistory();
    }

    async function fetchHistory() {
        const { data } = await _sb
            .from('inventory_history')
            .select('*')
            .eq('company_id', companyID)
            .order('created_at', { ascending: false });

        if(data) {
            fullHistory = data;
            renderTable(fullHistory);
        }
    }

    function renderTable(logs) {
        const body = document.getElementById('historyBody');
        if(logs.length === 0) {
            body.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:50px;">NO HISTORY FOUND</td></tr>';
            return;
        }

        body.innerHTML = logs.map(log => `
            <tr>
                <td>${new Date(log.log_date || log.created_at).toLocaleDateString()}</td>
                <td style="font-weight:700; color:var(--accent);">${log.sku}</td>
                <td><b>${log.item_nam}</b></td>
                <td><span class="badge">${log.action_type}</span></td>
                <td class="${log.type === 'IN' ? 'type-in' : 'type-out'}">${log.type}</td>
                <td style="font-weight:800;">${log.type === 'OUT' ? '-' : '+'}${log.qty_change}</td>
                <td><small>${log.performed_by || 'SYSTEM'}</small></td>
                <td style="font-size:0.65rem; color:#64748b;">${log.material || '-'}</td>
            </tr>
        `).join('');
    }

    function applyFilters() {
        const search = document.getElementById('globalSearch').value.toUpperCase();
        const flow = document.getElementById('flowFilter').value;
        const action = document.getElementById('actionFilter').value;

        const filtered = fullHistory.filter(log => {
            const matchesSearch = 
                (log.sku && log.sku.toUpperCase().includes(search)) || 
                (log.item_nam && log.item_nam.toUpperCase().includes(search)) || 
                (log.material && log.material.toUpperCase().includes(search));
            
            const matchesFlow = (flow === 'ALL' || log.type === flow);
            const matchesAction = (action === 'ALL' || log.action_type === action);

            return matchesSearch && matchesFlow && matchesAction;
        });

        renderTable(filtered);
    }

    window.onload = init;
</script>
</body>
</html>
