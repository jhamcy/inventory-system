<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Return | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #0f172a;
            --accent: #0081ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-main: #cbd5e1;
            --sidebar-width-desktop: 80px;
        }

        /* --- GLOBAL LAYOUT --- */
        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .navbar { height: 55px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; border-bottom: 3px solid var(--warning); }
        #company-name-text { color: white; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
        .user-label { font-size: 0.5rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .user-name { font-size: 0.65rem; color: white; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .action-bar-container { padding: 8px; background: #f1f5f9; flex-shrink: 0; }
        .toggle-group { display: flex; border-radius: 10px; overflow: hidden; background: var(--primary); border: 1px solid var(--primary); }
        .btn-toggle { 
            flex: 1; padding: 10px 0; border: none; border-right: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); background: var(--primary); cursor: pointer;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .btn-toggle.active { background: var(--accent) !important; color: white !important; }

        /* Content Panel */
        .right-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; gap: 10px; }
        
        @media (min-width: 1024px) {
            .main-content { flex-direction: row-reverse; }
            .action-bar-container { width: var(--sidebar-width-desktop); height: 100%; padding: 0; }
            .toggle-group { flex-direction: column; height: 100%; border-radius: 0; }
            .btn-toggle { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 25px 5px; }
            .btn-toggle span:first-child { font-size: 1.3rem; }
            .right-panel { padding: 30px; display: grid; grid-template-columns: 450px 1fr; gap: 20px; align-items: start; }
            #save-btn { grid-column: span 2; }
        }

        .input-card { background: white; border-radius: 12px; border: 1px solid var(--border-main); padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.55rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-main); border-radius: 8px; font-size: 0.8rem; font-weight: 700; outline: none; text-transform: uppercase; }
        textarea { height: 60px; resize: none; font-family: inherit; }

        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border-main); display: flex; flex-direction: column; overflow: hidden; min-height: 250px; }
        .table-header { background: #fffbeb; padding: 12px; font-weight: 800; font-size: 0.65rem; color: #92400e; border-bottom: 1px solid var(--warning); }
        .scroll-area { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: #fef3c7; padding: 10px; font-size: 0.6rem; border-bottom: 2px solid var(--warning); text-align: left; z-index: 10; }
        tbody td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; font-weight: 600; }

        .summary-bar { background: #92400e; color: white; padding: 15px; display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; }
        
        .badge-rtn { display: inline-block; background: #fef3c7; color: #92400e; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; border: 1px solid #fde68a; }

        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-submit { background: var(--warning); color: white; width: 100%; font-size: 0.85rem; box-shadow: 0 4px 0 #d97706; margin-top: 10px; }
    </style>
</head>
<body>

<header class="navbar">
    <span id="company-name-text">JMCYFLOW</span>
    <div style="display:flex; align-items:center;">
        <div class="user-info">
            <span class="user-label" id="user-role-label">System Admin</span>
            <span class="user-name"><div class="online-dot"></div><span id="active-user">Admin</span></span>
        </div>
        <button style="background:none; border:none; color:#ef4444; font-weight:800; cursor:pointer; font-size:0.65rem;" onclick="handleLogout()">LOGOUT</button>
    </div>
</header>

<main class="main-content">
    <div class="action-bar-container">
        <div class="toggle-group">
            <button class="btn-toggle" onclick="location.href='inventory.html'"><span>📋</span><span>Stock</span></button>
            <button class="btn-toggle" onclick="location.href='receiving.html'"><span>🚚</span><span>Recv</span></button>
            <button class="btn-toggle" onclick="location.href='orders.html'"><span>💰</span><span>Sales</span></button>
            <button class="btn-toggle" onclick="location.href='transfer.html'"><span>🔄</span><span>Trans</span></button>
            <button class="btn-toggle active"><span>↩️</span><span>Retn</span></button>
        </div>
    </div>

    <div class="right-panel">
        <div class="input-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Return Date</label>
                    <input type="date" id="return-date">
                </div>
                <div class="form-group">
                    <label>Ref #</label>
                    <input type="text" id="return-ref" readonly>
                </div>
                <div class="form-group">
                    <label>Return Flow</label>
                    <select id="return-flow">
                        <option value="CUSTOMER">FROM CUSTOMER (STOCK IN)</option>
                        <option value="SUPPLIER">TO SUPPLIER (STOCK OUT)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Primary Reason</label>
                    <select id="return-reason">
                        <option value="DEFECTIVE">DEFECTIVE ITEM</option>
                        <option value="WRONG_ITEM">WRONG ITEM SENT</option>
                        <option value="EXPIRED">EXPIRED STOCK</option>
                        <option value="CANCELLED">CANCELLED ORDER</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Item Selection</label>
                    <input list="items-list" id="item-search" placeholder="SKU OR NAME..." onchange="handleSelection()">
                    <datalist id="items-list"></datalist>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="return-qty" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Condition Note</label>
                    <input type="text" id="return-note" placeholder="EX: OPENED BOX, NO SEAL">
                </div>
            </div>
            <button class="btn btn-add" onclick="addToBatch()">Add to Return List ↓</button>
        </div>

        <div class="table-container">
            <div class="table-header">Return Batch Items</div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>SKU / Item</th>
                            <th>Reason</th>
                            <th style="text-align: center;">Qty</th>
                            <th style="text-align: center;">X</th>
                        </tr>
                    </thead>
                    <tbody id="batch-body"></tbody>
                </table>
            </div>
            <div class="summary-bar">
                <span>Unique: <span id="total-items">0</span></span>
                <span>TOTAL QTY: <span id="total-qty">0</span></span>
            </div>
        </div>

        <button class="btn btn-submit" id="save-btn" onclick="processReturn()">Confirm & Post Returns</button>
    </div>
</main>

<script>
    const _supabase = supabase.createClient('https://crruounuhtfzyssyhgcc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNycnVvdW51aHRmenlzc3loZ2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMjc5NDgsImV4cCI6MjA4NjgwMzk0OH0.PMLb-8HZLdXUxXk2Jv0f836_YVWcaS3X2ezCvjfG6jg');

    let masterInventory = [];
    let selectedItem = null;
    let batchItems = [];
    const companyID = localStorage.getItem('companyID');
    const activeUser = localStorage.getItem('activeAdmin');
    const userRole = localStorage.getItem('userRole');

    async function init() {
        if (!activeUser) { location.href = 'index.html'; return; }
        document.getElementById('return-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('return-ref').value = `RTN-${Date.now().toString().slice(-6)}`;
        document.getElementById('active-user').innerText = activeUser;
        document.getElementById('user-role-label').innerText = userRole.toUpperCase();
        loadInventory();
    }

    async function loadInventory() {
        const { data } = await _supabase.from('inventory').select('*').eq('company_id', companyID);
        masterInventory = data || [];
        document.getElementById('items-list').innerHTML = masterInventory.map(i => 
            `<option value="${i.sku} | ${i.item_name} [${i.location || 'MAIN'}]">`
        ).join('');
    }

    function handleSelection() {
        const val = document.getElementById('item-search').value.split(' | ')[0];
        selectedItem = masterInventory.find(i => i.sku === val);
    }

    function addToBatch() {
        const qty = parseInt(document.getElementById('return-qty').value);
        const reason = document.getElementById('return-reason').value;
        const note = document.getElementById('return-note').value;
        
        if (!selectedItem || isNaN(qty) || qty <= 0) return alert("Select item and quantity.");

        batchItems.push({ ...selectedItem, returnQty: qty, reason, note });
        renderTable();
        document.getElementById('item-search').value = "";
        document.getElementById('return-qty').value = "";
    }

    function renderTable() {
        const tbody = document.getElementById('batch-body');
        tbody.innerHTML = batchItems.map((item, idx) => `
            <tr>
                <td><strong>${item.sku}</strong><br><small>${item.item_name}</small></td>
                <td><span class="badge-rtn">${item.reason}</span><br><small>${item.note || ''}</small></td>
                <td style="text-align:center;">${item.returnQty}</td>
                <td style="text-align:center;"><button onclick="removeItem(${idx})" style="border:none; background:none; color:red; cursor:pointer">✕</button></td>
            </tr>
        `).join('');
        document.getElementById('total-items').innerText = batchItems.length;
        document.getElementById('total-qty').innerText = batchItems.reduce((sum, i) => sum + i.returnQty, 0);
    }

    function removeItem(idx) { batchItems.splice(idx, 1); renderTable(); }

    async function processReturn() {
        const flow = document.getElementById('return-flow').value;
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = "POSTING...";

        try {
            for (const item of batchItems) {
                // If CUSTOMER, qty is + (back into stock). If SUPPLIER, qty is - (out to supplier).
                const adjustment = flow === 'CUSTOMER' ? item.returnQty : -item.returnQty;

                // Update stock
                await _supabase.from('inventory').update({ quantity: item.quantity + adjustment }).eq('id', item.id);

                // Log Transaction with Staff ID
                await _supabase.from('inventory_transactions').insert([{
                    company_id: companyID,
                    type: 'RETURN',
                    reference_id: document.getElementById('return-ref').value,
                    sku: item.sku,
                    item_name: item.item_name,
                    qty_change: adjustment,
                    performed_by: activeUser,
                    user_role: userRole,
                    notes: `RETURN: ${flow} | REASON: ${item.reason} | NOTE: ${item.note}`.toUpperCase()
                }]);
            }
            alert("Return Session Processed!");
            location.reload();
        } catch (err) {
            alert(err.message);
            btn.disabled = false;
        }
    }

    function handleLogout() { localStorage.clear(); location.href = 'index.html'; }
    init();
</script>
</body>
</html>
