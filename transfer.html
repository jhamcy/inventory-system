<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Transfer | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #0f172a;
            --accent: #0081ff;
            --success: #10b981;
            --danger: #ef4444;
            --border-main: #cbd5e1;
            --sidebar-width-desktop: 80px;
        }

        /* --- GLOBAL LAYOUT --- */
        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .navbar { height: 55px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; border-bottom: 3px solid var(--accent); }
        #company-name-text { color: white; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
        .user-label { font-size: 0.5rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .user-name { font-size: 0.65rem; color: white; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Navigation Rail */
        .action-bar-container { padding: 8px; background: #f1f5f9; flex-shrink: 0; }
        .toggle-group { display: flex; border-radius: 10px; overflow: hidden; background: var(--primary); border: 1px solid var(--primary); }
        .btn-toggle { 
            flex: 1; padding: 10px 0; border: none; border-right: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); background: var(--primary); cursor: pointer;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .btn-toggle.active { background: var(--accent) !important; color: white !important; }

        /* Content Panel */
        .right-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; gap: 10px; }
        
        @media (min-width: 1024px) {
            .main-content { flex-direction: row-reverse; }
            .action-bar-container { width: var(--sidebar-width-desktop); height: 100%; padding: 0; }
            .toggle-group { flex-direction: column; height: 100%; border-radius: 0; }
            .btn-toggle { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 25px 5px; }
            .btn-toggle span:first-child { font-size: 1.3rem; }
            .right-panel { padding: 30px; display: grid; grid-template-columns: 400px 1fr; gap: 20px; align-items: start; }
            #save-btn { grid-column: span 2; }
        }

        .input-card { background: white; border-radius: 12px; border: 1px solid var(--border-main); padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.55rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-main); border-radius: 8px; font-size: 0.8rem; font-weight: 700; outline: none; text-transform: uppercase; }
        textarea { height: 60px; resize: none; font-family: inherit; }

        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border-main); display: flex; flex-direction: column; overflow: hidden; min-height: 250px; }
        .table-header { background: #f8fafc; padding: 12px; font-weight: 800; font-size: 0.65rem; color: var(--primary); border-bottom: 1px solid var(--border-main); }
        .scroll-area { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: #f8fafc; padding: 10px; font-size: 0.6rem; border-bottom: 2px solid var(--primary); text-align: left; z-index: 10; }
        tbody td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; font-weight: 600; }

        .summary-bar { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; }
        
        .route-tag { display: inline-block; background: #e2e8f0; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; }

        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-submit { background: var(--success); color: white; width: 100%; font-size: 0.85rem; box-shadow: 0 4px 0 #059669; margin-top: 10px; }
    </style>
</head>
<body>

<header class="navbar">
    <span id="company-name-text">JMCYFLOW</span>
    <div style="display:flex; align-items:center;">
        <div class="user-info">
            <span class="user-label" id="user-role-label">System Admin</span>
            <span class="user-name"><div class="online-dot"></div><span id="active-user">Admin</span></span>
        </div>
        <button style="background:none; border:none; color:#ef4444; font-weight:800; cursor:pointer; font-size:0.65rem;" onclick="handleLogout()">LOGOUT</button>
    </div>
</header>

<main class="main-content">
    <div class="action-bar-container">
        <div class="toggle-group">
            <button class="btn-toggle" onclick="location.href='inventory.html'"><span>📋</span><span>Stock</span></button>
            <button class="btn-toggle" onclick="location.href='receiving.html'"><span>🚚</span><span>Recv</span></button>
            <button class="btn-toggle" onclick="location.href='orders.html'"><span>💰</span><span>Sales</span></button>
            <button class="btn-toggle active"><span>🔄</span><span>Trans</span></button>
            <button class="btn-toggle" onclick="location.href='return.html'"><span>↩️</span><span>Retn</span></button>
        </div>
    </div>

    <div class="right-panel">
        <div class="input-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Transfer Date</label>
                    <input type="date" id="trans-date">
                </div>
                <div class="form-group">
                    <label>Reference #</label>
                    <input type="text" id="trans-ref" readonly>
                </div>
                <div class="form-group full-width">
                    <label>Source Item (Location & Stock)</label>
                    <input list="items-list" id="item-search" placeholder="SEARCH ITEM AT LOCATION..." onchange="handleSelection()">
                    <datalist id="items-list"></datalist>
                </div>
                <div class="form-group">
                    <label>Qty to Move</label>
                    <input type="number" id="move-qty" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Target Location</label>
                    <input type="text" id="target-loc" placeholder="E.G. SHELF B, BRANCH 2">
                </div>
                <div class="form-group full-width">
                    <label>Notes</label>
                    <textarea id="notes" placeholder="REASON FOR TRANSFER..."></textarea>
                </div>
            </div>
            <button class="btn btn-add" onclick="addToBatch()">Add to Transfer List ↓</button>
        </div>

        <div class="table-container">
            <div class="table-header">Internal Movements Preview</div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>Item Details</th>
                            <th>Route</th>
                            <th style="text-align: center;">Qty</th>
                            <th style="text-align: center;">X</th>
                        </tr>
                    </thead>
                    <tbody id="batch-body"></tbody>
                </table>
            </div>
            <div class="summary-bar">
                <span>Unique Items: <span id="total-items">0</span></span>
                <span>TOTAL QTY: <span id="total-qty">0</span></span>
            </div>
        </div>

        <button class="btn btn-submit" id="save-btn" onclick="processTransfer()">Confirm & Post Transfer</button>
    </div>
</main>

<script>
    const _supabase = supabase.createClient('https://crruounuhtfzyssyhgcc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNycnVvdW51aHRmenlzc3loZ2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMjc5NDgsImV4cCI6MjA4NjgwMzk0OH0.PMLb-8HZLdXUxXk2Jv0f836_YVWcaS3X2ezCvjfG6jg');

    let masterInventory = [];
    let selectedItem = null;
    let batchItems = [];
    const companyID = localStorage.getItem('companyID');
    const activeUser = localStorage.getItem('activeAdmin');
    const userRole = localStorage.getItem('userRole');

    async function init() {
        if (!activeUser) { location.href = 'index.html'; return; }
        document.getElementById('trans-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('trans-ref').value = `TRF-${Date.now().toString().slice(-6)}`;
        document.getElementById('active-user').innerText = activeUser;
        document.getElementById('user-role-label').innerText = userRole.toUpperCase();
        loadInventory();
    }

    async function loadInventory() {
        const { data } = await _supabase.from('inventory').select('*').eq('company_id', companyID);
        masterInventory = data || [];
        document.getElementById('items-list').innerHTML = masterInventory.map(i => 
            `<option value="${i.sku} | ${i.item_name} [${i.location || 'MAIN'}]">`
        ).join('');
    }

    function handleSelection() {
        const val = document.getElementById('item-search').value.split(' | ')[0];
        selectedItem = masterInventory.find(i => i.sku === val);
    }

    function addToBatch() {
        const qty = parseInt(document.getElementById('move-qty').value);
        const target = document.getElementById('target-loc').value.trim().toUpperCase();
        
        if (!selectedItem || isNaN(qty) || qty <= 0 || !target) return alert("Fill all fields.");
        if (qty > selectedItem.quantity) return alert("Insufficient stock at source!");
        if (target === selectedItem.location) return alert("Source and Target cannot be the same!");

        batchItems.push({ ...selectedItem, moveQty: qty, targetLoc: target });
        renderTable();
        
        document.getElementById('item-search').value = "";
        document.getElementById('move-qty').value = "";
        selectedItem = null;
    }

    function renderTable() {
        const tbody = document.getElementById('batch-body');
        tbody.innerHTML = batchItems.map((item, idx) => `
            <tr>
                <td><strong>${item.sku}</strong><br><small>${item.item_name}</small></td>
                <td><span class="route-tag">${item.location || 'MAIN'}</span> → <span class="route-tag">${item.targetLoc}</span></td>
                <td style="text-align:center;">${item.moveQty}</td>
                <td style="text-align:center;"><button onclick="removeItem(${idx})" style="border:none; background:none; color:red; cursor:pointer">✕</button></td>
            </tr>
        `).join('');

        document.getElementById('total-items').innerText = batchItems.length;
        document.getElementById('total-qty').innerText = batchItems.reduce((sum, i) => sum + i.moveQty, 0);
    }

    function removeItem(idx) { batchItems.splice(idx, 1); renderTable(); }

    async function processTransfer() {
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = "PROCESSING...";

        try {
            for (const item of batchItems) {
                // 1. Subtract from Source
                await _supabase.from('inventory').update({ quantity: item.quantity - item.moveQty }).eq('id', item.id);

                // 2. Add to Target (Find if SKU exists at that specific location)
                const { data: targetExists } = await _supabase.from('inventory')
                    .select('*').eq('sku', item.sku).eq('location', item.targetLoc).maybeSingle();

                if (targetExists) {
                    await _supabase.from('inventory').update({ quantity: targetExists.quantity + item.moveQty }).eq('id', targetExists.id);
                } else {
                    await _supabase.from('inventory').insert([{
                        company_id: companyID, sku: item.sku, item_name: item.item_name,
                        location: item.targetLoc, quantity: item.moveQty, uom: item.uom, unit_price: item.unit_price
                    }]);
                }

                // 3. Log Transaction with IDENTITY
                await _supabase.from('inventory_transactions').insert([{
                    company_id: companyID, type: 'TRANSFER', reference_id: document.getElementById('trans-ref').value,
                    sku: item.sku, item_name: item.item_name, qty_change: 0, // Net change is zero for the whole company
                    performed_by: activeUser, user_role: userRole,
                    notes: `MOVED ${item.moveQty} FROM ${item.location} TO ${item.targetLoc}`
                }]);
            }
            alert("Transfer Posted Successfully!");
            location.reload();
        } catch (err) {
            alert(err.message);
            btn.disabled = false;
        }
    }

    function handleLogout() { localStorage.clear(); location.href = 'index.html'; }
    init();
</script>
</body>
</html>
