<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Transfer | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #0f172a;
            --accent: #0081ff;
            --success: #10b981;
            --danger: #ef4444;
            --border-main: #cbd5e1;
            --sidebar-width-desktop: 80px;
        }

        /* --- GLOBAL LAYOUT --- */
        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .navbar { height: 50px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        #company-name-text { color: white; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
        .user-label { font-size: 0.5rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .user-name { font-size: 0.65rem; color: white; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 5px; height: 5px; background: var(--success); border-radius: 50%; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Navigation Rail */
        .action-bar-container { padding: 8px; background: #f1f5f9; flex-shrink: 0; }
        .toggle-group { display: flex; border-radius: 8px; overflow: hidden; background: var(--primary); border: 1px solid var(--primary); }
        .btn-toggle { 
            flex: 1; padding: 8px 0; border: none; border-right: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); background: var(--primary); cursor: pointer;
            font-size: 0.55rem; font-weight: 700; text-transform: uppercase; 
            display: flex; flex-direction: column; gap: 2px; align-items: center;
        }
        .btn-toggle.active { background: var(--accent) !important; color: white !important; }

        /* Content Panel */
        .right-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 8px; gap: 8px; }
        
        @media (min-width: 1024px) {
            .main-content { flex-direction: row-reverse; }
            .action-bar-container { width: var(--sidebar-width-desktop); height: 100%; padding: 0; }
            .toggle-group { flex-direction: column; height: 100%; border-radius: 0; }
            .btn-toggle { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 18px 5px; }
            .btn-toggle span:first-child { font-size: 1.2rem; }
            .right-panel { padding: 20px; display: grid; grid-template-columns: 400px 1fr; gap: 15px; align-items: start; }
            #save-btn { grid-column: span 1; } /* Adjusted for grid logic */
        }

        .input-card { background: white; border-radius: 8px; border: 1px solid var(--border-main); padding: 15px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.55rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-main); border-radius: 6px; font-size: 0.8rem; font-weight: 700; outline: none; text-transform: uppercase; background: white; }
        textarea { height: 60px; resize: none; font-family: inherit; }

        .table-container { background: white; border-radius: 8px; border: 1px solid var(--border-main); display: flex; flex-direction: column; overflow: hidden; min-height: 250px; }
        .table-header { background: #f8fafc; padding: 10px; font-weight: 800; font-size: 0.65rem; color: var(--primary); border-bottom: 1px solid var(--border-main); }
        .scroll-area { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: #f8fafc; padding: 10px; font-size: 0.55rem; border-bottom: 1px solid var(--border-main); text-align: left; text-transform: uppercase; color: #64748b; z-index: 10; }
        tbody td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }

        .summary-bar { background: var(--primary); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; }
        .route-tag { display: inline-block; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; color: var(--primary); border: 1px solid #cbd5e1; }

        .btn { border: none; border-radius: 6px; padding: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-submit { background: var(--success); color: white; width: 100%; font-size: 0.85rem; box-shadow: 0 4px 0 #059669; margin-top: 10px; margin-bottom: 20px;}
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-logo-area" onclick="location.href='inventory.html'">
        <span id="company-name-text">JMCYFLOW</span>
    </div>
    <div style="display:flex; align-items:center;">
        <div class="user-info">
            <span class="user-label" id="user-role-label">Staff</span>
            <span class="user-name"><div class="online-dot"></div><span id="active-user">---</span></span>
        </div>
        <button style="background:none; border:none; color:#ef4444; font-weight:800; cursor:pointer; font-size:0.6rem;" onclick="handleLogout()">EXIT</button>
    </div>
</header>

<main class="main-content">
    <div class="action-bar-container">
        <div class="toggle-group">
            <button class="btn-toggle" onclick="location.href='inventory.html'"><span>📋</span><span>Stock</span></button>
            <button class="btn-toggle" onclick="location.href='receiving.html'"><span>🚚</span><span>Recv</span></button>
            <button class="btn-toggle" onclick="location.href='order.html'"><span>📦</span><span>Outslip</span></button>
            <button class="btn-toggle active"><span>🔄</span><span>Trans</span></button>
            <button class="btn-toggle" onclick="location.href='return.html'"><span>↩️</span><span>Retn</span></button>
            <button class="btn-toggle" onclick="location.href='logs.html'"><span>📜</span><span>Logs</span></button>
        </div>
    </div>

    <div class="right-panel">
        <div class="input-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Transfer Date</label>
                    <input type="date" id="trans-date">
                </div>
                <div class="form-group">
                    <label>Reference #</label>
                    <input type="text" id="trans-ref" readonly>
                </div>
                <div class="form-group full-width">
                    <label>Source Item (Location & Stock)</label>
                    <input list="items-list" id="item-search" placeholder="SEARCH ITEM..." onchange="handleSelection()">
                    <datalist id="items-list"></datalist>
                </div>
                <div class="form-group">
                    <label>Qty to Move</label>
                    <input type="number" id="move-qty" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Target Location</label>
                    <select id="target-loc-dropdown">
                        <option value="">-- SELECT TARGET --</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>Notes</label>
                    <textarea id="notes" placeholder="REASON FOR TRANSFER..."></textarea>
                </div>
            </div>
            <button class="btn btn-add" onclick="addToBatch()">Add to Transfer List ↓</button>
        </div>

        <div style="display: flex; flex-direction: column;">
            <div class="table-container">
                <div class="table-header">Internal Movements Preview</div>
                <div class="scroll-area">
                    <table>
                        <thead>
                            <tr>
                                <th>Item Details</th>
                                <th>Route</th>
                                <th style="text-align: center;">Qty</th>
                                <th style="text-align: center;">X</th>
                            </tr>
                        </thead>
                        <tbody id="batch-body"></tbody>
                    </table>
                </div>
                <div class="summary-bar">
                    <span>Unique Items: <span id="total-items">0</span></span>
                    <span>TOTAL QTY: <span id="total-qty">0</span></span>
                </div>
            </div>
            <button class="btn btn-submit" id="save-btn" onclick="processTransfer()">Confirm & Post Transfer</button>
        </div>
    </div>
</main>

<script>
    const _supabase = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');

    let masterInventory = [];
    let selectedItem = null;
    let batchItems = [];
    const companyID = localStorage.getItem('jmcy_cid');
    const activeUser = localStorage.getItem('jmcy_user') || "DEMO USER";

    async function init() {
        document.getElementById('trans-date').valueAsDate = new Date();
        document.getElementById('trans-ref').value = `TRF-${Date.now().toString().slice(-6)}`;
        document.getElementById('active-user').innerText = activeUser;
        if(companyID) {
            await loadInventory();
            populateTargetDropdown();
        }
    }

    async function loadInventory() {
        const { data } = await _supabase.from('inventory').select('*').eq('company_id', companyID);
        masterInventory = data || [];
        document.getElementById('items-list').innerHTML = masterInventory.map(i => 
            `<option value="${i.sku} | ${i.item_name} [Loc: ${i.location}] (Stock: ${i.quantity})">`
        ).join('');
    }

    function populateTargetDropdown() {
        const dropdown = document.getElementById('target-loc-dropdown');
        const locations = [...new Set(masterInventory.map(item => item.location))]
            .filter(loc => loc && loc.trim() !== "")
            .sort();

        locations.forEach(loc => {
            const opt = document.createElement('option');
            opt.value = loc;
            opt.textContent = loc;
            dropdown.appendChild(opt);
        });
    }

    function handleSelection() {
        const inputVal = document.getElementById('item-search').value;
        const skuPart = inputVal.split(' | ')[0];
        const locPartMatch = inputVal.match(/\[Loc: (.*?)\]/);
        const locPart = locPartMatch ? locPartMatch[1] : null;

        selectedItem = masterInventory.find(i => i.sku === skuPart && i.location === locPart);
    }

    function addToBatch() {
        const qty = parseInt(document.getElementById('move-qty').value);
        const target = document.getElementById('target-loc-dropdown').value;
        
        if (!selectedItem || isNaN(qty) || qty <= 0 || !target) return alert("Select item, qty, and target location.");
        if (qty > selectedItem.quantity) return alert("Insufficient stock at source!");
        if (target === selectedItem.location) return alert("Source and Target cannot be the same!");

        batchItems.push({ ...selectedItem, moveQty: qty, targetLoc: target });
        renderTable();
        
        document.getElementById('item-search').value = "";
        document.getElementById('move-qty').value = "";
        selectedItem = null;
    }

    function renderTable() {
        const tbody = document.getElementById('batch-body');
        tbody.innerHTML = batchItems.map((item, idx) => `
            <tr>
                <td><strong>${item.sku}</strong><br><small>${item.item_name}</small></td>
                <td><span class="route-tag">${item.location}</span> → <span class="route-tag" style="background:var(--accent); color:white; border-color:var(--accent)">${item.targetLoc}</span></td>
                <td style="text-align:center; font-weight:800; color:var(--accent)">${item.moveQty}</td>
                <td style="text-align:center;"><button onclick="removeItem(${idx})" style="border:none; background:none; color:red; cursor:pointer; font-weight:bold">✕</button></td>
            </tr>
        `).join('');

        document.getElementById('total-items').innerText = batchItems.length;
        document.getElementById('total-qty').innerText = batchItems.reduce((sum, i) => sum + i.moveQty, 0);
    }

    function removeItem(idx) { batchItems.splice(idx, 1); renderTable(); }

    async function processTransfer() {
        if(batchItems.length === 0) return alert("Add items to the list first.");
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = "POSTING...";

        try {
            for (const item of batchItems) {
                const { error } = await _supabase.rpc('handle_transfer', {
                    p_company_id: companyID,
                    p_sku: item.sku,
                    p_qty_move: item.moveQty,
                    p_source_loc: item.location,
                    p_target_loc: item.targetLoc,
                    p_conducted_by: activeUser,
                    p_reference_no: document.getElementById('trans-ref').value,
                    p_notes: document.getElementById('notes').value
                });
                if (error) throw error;
            }
            alert("Transfer Complete!");
            location.reload();
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
            btn.innerText = "Confirm & Post Transfer";
        }
    }

    function handleLogout() { localStorage.clear(); location.href = 'login.html'; }
    init();
</script>
</body>
</html>
