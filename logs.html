<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Audit Logs | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #0081ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-main: #cbd5e1;
            --sidebar-width-desktop: 80px;
        }

        /* --- GLOBAL LAYOUT --- */
        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        .navbar { height: 55px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; border-bottom: 3px solid var(--accent); }
        #company-name-text { color: white; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .action-bar-container { padding: 8px; background: #f1f5f9; flex-shrink: 0; }
        .toggle-group { display: flex; border-radius: 10px; overflow: hidden; background: var(--primary); border: 1px solid var(--primary); }
        .btn-toggle { 
            flex: 1; padding: 10px 0; border: none; border-right: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); background: var(--primary); cursor: pointer;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .btn-toggle.active { background: var(--accent) !important; color: white !important; }

        .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 10px; }
        .log-card { background: white; border-radius: 12px; border: 1px solid var(--border-main); display: flex; flex-direction: column; height: 100%; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        .filter-area { padding: 12px; border-bottom: 1px solid var(--border-main); background: #f8fafc; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .search-wrapper { grid-column: span 2; }
        
        input, select { 
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-main);
            font-size: 0.75rem; font-weight: 700; outline: none; text-transform: uppercase;
        }

        .grid-area { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        thead th { position: sticky; top: 0; background: #f1f5f9; font-size: 0.6rem; font-weight: 800; border-bottom: 2px solid var(--primary); text-transform: uppercase; z-index: 20; padding: 12px 10px; text-align: left; }
        
        /* Interactive Row Styling */
        tbody tr { cursor: pointer; transition: background 0.2s; }
        tbody tr:hover { background: #f1f5f9; }
        
        tbody td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; font-weight: 600; vertical-align: middle; }

        .badge { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 0.6rem; color: white; text-transform: uppercase; }
        .role-badge { font-size: 0.55rem; background: #e2e8f0; color: #475569; padding: 2px 5px; border-radius: 3px; margin-left: 5px; }
        .summary-text { font-size: 0.65rem; color: #64748b; display: block; margin-top: 2px; }

        .bulk-footer { padding: 12px; border-top: 1px solid var(--border-main); display: flex; justify-content: space-between; align-items: center; background: white; }
        #log-count { font-size: 0.7rem; font-weight: 800; color: var(--primary); }
        .btn-exit { padding: 8px 15px; background: var(--primary); color: white; border-radius: 6px; font-weight: 800; text-decoration: none; font-size: 0.7rem; }

        @media (min-width: 1024px) {
            .main-content { flex-direction: row-reverse; }
            .action-bar-container { width: var(--sidebar-width-desktop); height: 100%; padding: 0; }
            .toggle-group { flex-direction: column; height: 100%; border-radius: 0; }
            .btn-toggle { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 25px 5px; }
            .filter-grid { grid-template-columns: 2fr 1fr 1fr 1fr; }
            .search-wrapper { grid-column: span 1; }
            .right-panel { padding: 20px; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <span id="company-name-text">JMCYFLOW LOGS</span>
    <button onclick="location.href='inventory.html'" style="background:var(--accent); color:white; border:none; padding:5px 10px; border-radius:4px; font-weight:800; font-size:0.6rem; cursor:pointer;">BACK TO STOCK</button>
</header>

<main class="main-content">
    <div class="action-bar-container">
        <div class="toggle-group">
            <button class="btn-toggle" onclick="location.href='inventory.html'"><span>📋</span><span>Stock</span></button>
            <button class="btn-toggle" onclick="location.href='receiving.html'"><span>🚚</span><span>Recv</span></button>
            <button class="btn-toggle" onclick="location.href='orders.html'"><span>💰</span><span>Sales</span></button>
            <button class="btn-toggle" onclick="location.href='transfer.html'"><span>🔄</span><span>Trans</span></button>
            <button class="btn-toggle" onclick="location.href='return.html'"><span>↩️</span><span>Retn</span></button>
        </div>
    </div>

    <div class="right-panel">
        <div class="log-card">
            <div class="filter-area">
                <div class="filter-grid">
                    <div class="search-wrapper">
                        <input type="text" id="mainSearch" placeholder="SEARCH REF OR DETAILS..." onkeyup="applyFilters()">
                    </div>
                    <select id="typeFilter" onchange="applyFilters()">
                        <option value="ALL">ALL ACTIVITIES</option>
                        <option value="RECEIVING">RECEIVING</option>
                        <option value="SALE">SALES</option>
                        <option value="TRANSFER">TRANSFERS</option>
                        <option value="RETURN">RETURNS</option>
                    </select>
                    <input type="date" id="dateFrom" onchange="applyFilters()">
                    <input type="date" id="dateTo" onchange="applyFilters()">
                </div>
            </div>

            <div class="grid-area">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">Date</th>
                            <th style="width: 100px;">Type</th>
                            <th>Reference & Activity (Click to View)</th>
                            <th style="width: 150px;">Performed By</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="4" style="text-align:center; padding:40px; color:#94a3b8;">Scanning database...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="bulk-footer">
                <div id="log-count">0 ENTRIES</div>
                <button onclick="resetFilters()" style="background:none; border:none; color:var(--accent); font-weight:800; cursor:pointer; font-size:0.7rem;">RESET FILTERS</button>
                <a href="inventory.html" class="btn-exit">EXIT</a>
            </div>
        </div>
    </div>
</main>

<script>
    const _supabase = supabase.createClient('https://crruounuhtfzyssyhgcc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNycnVvdW51aHRmenlzc3loZ2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMjc5NDgsImV4cCI6MjA4NjgwMzk0OH0.PMLb-8HZLdXUxXk2Jv0f836_YVWcaS3X2ezCvjfG6jg');

    let allLogs = [];
    const companyID = localStorage.getItem('companyID');

    async function init() {
        if (!localStorage.getItem('activeAdmin')) { location.href = 'index.html'; return; }
        fetchLogs();
    }

    async function fetchLogs() {
        const { data, error } = await _supabase
            .from('inventory_transactions')
            .select('*')
            .eq('company_id', companyID)
            .order('created_at', { ascending: false });

        if (error) { console.error(error); return; }

        // Logic to group by reference_id if you only want one row per transaction session
        // For now, we show individual movements, which is safer for auditing
        allLogs = data.map(log => ({
            ...log,
            shortDate: new Date(log.created_at).toLocaleDateString('en-GB'),
            rawDate: log.created_at.split('T')[0]
        }));

        renderTable(allLogs);
    }

    function renderTable(list) {
        const tbody = document.getElementById('logs-body');
        document.getElementById('log-count').innerText = `${list.length} ENTRIES FOUND`;

        if (list.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">No matching records.</td></tr>';
            return;
        }

        tbody.innerHTML = list.map(log => `
            <tr onclick="location.href='transaction.html?ref=${encodeURIComponent(log.reference_id)}'">
                <td style="color:#64748b; font-size:0.7rem;">${log.shortDate}</td>
                <td><span class="badge" style="background:${getTypeColor(log.type)}">${log.type}</span></td>
                <td>
                    <strong>${log.reference_id}</strong>
                    <span class="summary-text">${log.notes || log.item_name}</span>
                </td>
                <td>
                    <div style="display:flex; align-items:center;">
                        <strong>${(log.performed_by || 'Unknown').toUpperCase()}</strong>
                        <span class="role-badge">${(log.user_role || 'Staff').toUpperCase()}</span>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function getTypeColor(type) {
        switch(type) {
            case 'RECEIVING': return '#059669';
            case 'SALE': return '#6366f1';
            case 'TRANSFER': return '#0ea5e9';
            case 'RETURN': return '#f59e0b';
            default: return '#64748b';
        }
    }

    function applyFilters() {
        const search = document.getElementById('mainSearch').value.toUpperCase();
        const type = document.getElementById('typeFilter').value;
        const from = document.getElementById('dateFrom').value;
        const to = document.getElementById('dateTo').value;

        const filtered = allLogs.filter(log => {
            const matchesSearch = (log.reference_id + (log.notes || '') + log.item_name).toUpperCase().includes(search);
            const matchesType = type === 'ALL' || log.type === type;
            let matchesDate = true;
            if (from && log.rawDate < from) matchesDate = false;
            if (to && log.rawDate > to) matchesDate = false;

            return matchesSearch && matchesType && matchesDate;
        });
        renderTable(filtered);
    }

    function resetFilters() {
        document.getElementById('mainSearch').value = '';
        document.getElementById('typeFilter').value = 'ALL';
        document.getElementById('dateFrom').value = '';
        document.getElementById('dateTo').value = '';
        renderTable(allLogs);
    }

    init();
</script>
</body>
</html>
