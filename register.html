<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | JmcyFlow Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --dark-bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-dim: #94a3b8; --accent: #38bdf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .reg-card { background: var(--card-bg); width: 100%; max-width: 550px; padding: 35px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; }
        .header h2 span { color: var(--accent); }
        .section-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .form-group { margin-bottom: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 10px 14px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; outline: none; transition: 0.3s; font-family: inherit; font-size: 0.9rem; }
        input:focus, textarea:focus { border-color: var(--primary); background: #0f172a; }
        textarea { resize: none; height: 50px; }
        
        .file-input-wrapper { border: 2px dashed rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .file-input-wrapper:hover { border-color: var(--accent); background: rgba(56, 189, 248, 0.05); }
        input[type="file"] { display: none; }
        .logo-preview { max-height: 60px; margin-top: 10px; border-radius: 4px; display: none; margin-left: auto; margin-right: auto; }

        .btn-reg { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 1rem; transition: 0.3s; }
        .btn-reg:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-reg:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="reg-card">
        <div class="header">
            <h2>Jmcy<span>Flow</span></h2>
            <p style="color: var(--text-dim); font-size: 0.8rem;">Professional Invoice Setup</p>
        </div>
        <form id="regForm">
            
            <div class="section-label">Business Identity</div>
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" id="compName" placeholder="Acme Web Solutions Inc." required>
            </div>
            
            <div class="form-group">
                <label>Company Logo</label>
                <label for="logoFile" class="file-input-wrapper">
                    <span id="file-label" style="font-size: 0.8rem; color: var(--text-dim);">Click to upload logo (PNG/JPG)</span>
                    <input type="file" id="logoFile" accept="image/*" onchange="previewLogo(this)">
                    <img id="logoPreview" class="logo-preview">
                </label>
            </div>

            <div class="form-group">
                <label>Business Address</label>
                <textarea id="compAddr" placeholder="123 Business Park, Metro Manila" required></textarea>
            </div>

            <div class="section-label">Tax & Contact Info</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>TIN Number</label>
                    <input type="text" id="compTIN" placeholder="000-000-000-000" required>
                </div>
                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="text" id="compContact" placeholder="09xx-xxx-xxxx" required>
                </div>
            </div>
            <div class="form-group">
                <label>Business Email (Printed on Invoice)</label>
                <input type="email" id="compEmail" placeholder="billing@yourcompany.com" required>
            </div>

            <div class="section-label">Account & Security</div>
            <div class="form-group">
                <label>Portal ID (Unique URL)</label>
                <input type="text" id="compID" placeholder="my-business-url" required>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Admin User</label>
                    <!-- Added style to force visual uppercase -->
                    <input type="text" id="adminUser" style="text-transform: uppercase;" required>
                </div>
                <div class="form-group">
                    <label>Admin Pass</label>
                    <!-- Added style to force visual uppercase -->
                    <input type="password" id="adminPass" style="text-transform: uppercase;" minlength="6" required>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-reg">Create My Portal</button>
        </form>
    </div>

    <script>
        const _supabase = supabase.createClient("https://pehffyqlssrqogosfsab.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s");
        
        function previewLogo(input) {
            const preview = document.getElementById('logoPreview');
            const label = document.getElementById('file-label');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    label.innerText = input.files[0].name;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const logoFile = document.getElementById('logoFile').files[0];
            const portalId = document.getElementById('compID').value.toLowerCase().trim();
            
            // Force values to uppercase for the database
            const adminUser = document.getElementById('adminUser').value.trim().toUpperCase();
            const adminPass = document.getElementById('adminPass').value.toUpperCase();
            
            btn.disabled = true;
            btn.innerText = "Building your portal...";

            let logoUrl = "";

            if (logoFile) {
                const fileExt = logoFile.name.split('.').pop();
                const fileName = `${portalId}-${Math.random().toString(36).substring(7)}.${fileExt}`;
                const filePath = `logos/${fileName}`;

                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('public') 
                    .upload(filePath, logoFile);

                if (!uploadError) {
                    const { data: publicUrlData } = _supabase.storage.from('public').getPublicUrl(filePath);
                    logoUrl = publicUrlData.publicUrl;
                }
            }

            const companyPayload = {
                portal_id: portalId,
                company_name: document.getElementById('compName').value.trim(),
                company_address: document.getElementById('compAddr').value.trim(),
                tin_number: document.getElementById('compTIN').value.trim(),
                contact_number: document.getElementById('compContact').value.trim(),
                business_email: document.getElementById('compEmail').value.trim(),
                admin_user: adminUser,
                admin_pass: adminPass,
                logo_url: logoUrl,
                trial_expires: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString()
            };

            const { data: companyData, error: companyError } = await _supabase
                .from('companies')
                .insert([companyPayload])
                .select()
                .single();
            
            if(companyError) { 
                alert("Database Error: " + companyError.message); 
                btn.disabled = false; 
                btn.innerText = "Create My Portal"; 
                return;
            }

            const staffPayload = {
                company_id: companyData.id,
                full_name: "SYSTEM OWNER",
                username: adminUser, // already uppercase
                password: adminPass, // already uppercase
                role: "OWNER"
            };

            const { error: staffError } = await _supabase
                .from('staff_members')
                .insert([staffPayload]);

            if(staffError) {
                alert("Company created, but staff account failed: " + staffError.message);
            } else {
                if(logoUrl) localStorage.setItem('jmcy_logo', logoUrl);
                window.location.href = `login.html?id=${portalId}`; 
            }
        });
    </script>
</body>
</html>
