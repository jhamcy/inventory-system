<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Items | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --border-main: #cbd5e1; }
        * { box-sizing: border-box; text-transform: uppercase; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .navbar { height: 60px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 3px solid var(--accent); }
        .nav-title { color: white; font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; }

        .main-content { flex: 1; padding: 20px; display: flex; justify-content: center; overflow: hidden; }
        .bulk-card { background: white; border-radius: 12px; border: 1px solid var(--border-main); width: 100%; max-width: 1400px; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        .bulk-header { padding: 15px 20px; border-bottom: 1px solid var(--border-main); display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
        .grid-area { flex: 1; overflow: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        th { position: sticky; top: 0; background: #f8fafc; font-size: 0.7rem; font-weight: 700; color: #64748b; border-bottom: 2px solid var(--border-main); padding: 12px; z-index: 10; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; }

        /* Sticky Columns */
        .sticky-del { position: sticky; left: 0; background: #f8fafc; width: 50px; text-align: center; z-index: 11; border-right: 1px solid var(--border-main); }
        .sticky-num { position: sticky; left: 50px; background: #f8fafc; width: 50px; text-align: center; z-index: 11; border-right: 2px solid var(--border-main); }
        
        input, select { width: 100%; padding: 8px; border: 1px solid transparent; border-radius: 4px; font-size: 0.75rem; font-weight: 600; outline: none; }
        input:focus { border-color: var(--accent); background: #fff; }
        .row-sku { background: #f8fafc; color: var(--accent); font-family: monospace; }
        .row-prc { text-align: right; color: var(--success); font-weight: 800; }

        .bulk-footer { padding: 15px 20px; border-top: 1px solid var(--border-main); display: flex; gap: 12px; background: white; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 800; font-size: 0.7rem; cursor: pointer; border: none; transition: 0.2s; }
        .btn-save { background: var(--primary); color: white; flex: 1; box-shadow: 0 4px 0 #000; }
        .btn-save:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .btn-add { background: #f1f5f9; color: var(--primary); border: 1px solid var(--border-main); }
        .btn-import { background: var(--success); color: white; }
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-title" id="nav-text">JMCYFLOW | ADD ITEMS</div>
    <button class="btn" style="background:var(--danger); color:white;" onclick="location.href='inventory.html'">BACK</button>
</header>

<main class="main-content">
    <div class="bulk-card">
        <div class="bulk-header">
            <h2 style="font-size: 0.9rem; margin:0;">BULK ITEM REGISTRATION</h2>
            <label class="btn btn-import">📁 IMPORT EXCEL <input type="file" id="excel-upload" hidden onchange="handleExcel(event)"></label>
        </div>

        <div class="grid-area">
            <table>
                <thead>
                    <tr>
                        <th class="sticky-del">DEL</th>
                        <th class="sticky-num">#</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Item Code (SKU)</th>
                        <th style="width: 250px;">Description</th>
                        <th>Type</th>
                        <th>Material</th>
                        <th>Brand</th>
                        <th>Price</th>
                        <th>UoM</th>
                    </tr>
                </thead>
                <tbody id="bulk-body"></tbody>
            </table>
        </div>

        <div class="bulk-footer">
            <button class="btn btn-add" onclick="addNewRow()">+ ADD ROW</button>
            <button class="btn btn-save" id="save-btn" onclick="saveAllItems()">REGISTER ALL ITEMS</button>
        </div>
    </div>
</main>

<script>
    const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');
    const companyID = localStorage.getItem('jmcy_cid');
    const userName = localStorage.getItem('jmcy_user') || 'SYSTEM';

    async function init() {
        if(!companyID) return location.href = 'portal.html';
        for(let i=0; i<8; i++) addNewRow();
    }

    function addNewRow(data = {}) {
        const tbody = document.getElementById('bulk-body');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="sticky-del"><button onclick="this.closest('tr').remove(); updateNums()" style="color:var(--danger); border:none; background:none; cursor:pointer; font-weight:bold;">✕</button></td>
            <td class="sticky-num"></td>
            <td><input type="text" class="row-cat" placeholder="CATEGORY" value="${data.category || ''}"></td>
            <td><input type="text" class="row-loc" placeholder="MAIN" value="${data.location || 'MAIN'}"></td>
            <td><input type="text" class="row-sku" placeholder="AUTO-GEN" value="${data.sku || ''}"></td>
            <td><input type="text" class="row-nam" placeholder="ITEM DESCRIPTION" value="${data.item_nam || ''}"></td>
            <td><input type="text" class="row-typ" placeholder="TYPE" value="${data.type || ''}"></td>
            <td><input type="text" class="row-mat" placeholder="MATERIAL" value="${data.material || ''}"></td>
            <td><input type="text" class="row-brd" placeholder="BRAND" value="${data.brand || ''}"></td>
            <td><input type="number" class="row-prc" placeholder="0.00" step="0.01" value="${data.unit_price || ''}"></td>
            <td><input type="text" class="row-uom" placeholder="PCS" value="${data.uom || 'PCS'}"></td>
        `;
        tbody.appendChild(tr);
        updateNums();
    }

    function updateNums() {
        document.querySelectorAll('.sticky-num').forEach((td, i) => td.innerText = i + 1);
    }

    async function saveAllItems() {
        const rows = document.querySelectorAll('#bulk-body tr');
        const items = [];
        const logs = [];

        rows.forEach(row => {
            const nam = row.querySelector('.row-nam').value.trim();
            // Generate SKU if empty
            let sku = row.querySelector('.row-sku').value.trim();
            if(!sku && nam) sku = 'SKU-' + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            if (nam) {
                const fullItemData = {
                    company_id: companyID,
                    sku: sku,
                    item_nam: nam,
                    category: row.querySelector('.row-cat').value.trim(),
                    location: row.querySelector('.row-loc').value.trim(),
                    type: row.querySelector('.row-typ').value.trim(),
                    material: row.querySelector('.row-mat').value.trim(),
                    brand: row.querySelector('.row-brd').value.trim(),
                    unit_price: parseFloat(row.querySelector('.row-prc').value) || 0,
                    uom: row.querySelector('.row-uom').value.trim() || 'PCS'
                };

                // Add to main inventory list
                items.push({ ...fullItemData, stock_qty: 0 });

                // Add to history list (matches your new full-column SQL history table)
                logs.push({
                    ...fullItemData,
                    item_name: nam, // Mapping to history table column name if different
                    action_type: 'REGISTRATION',
                    qty_change: 0,
                    performed_by: userName
                });
            }
        });

        if (!items.length) return alert("PLEASE ENTER AT LEAST ONE ITEM DESCRIPTION");

        const btn = document.getElementById('save-btn');
        btn.disabled = true; 
        btn.innerText = "PROCESSING...";

        try {
            // 1. Insert into Inventory
            const { error: insError } = await _sb.from('inventory').insert(items);
            if (insError) throw insError;
            
            // 2. Insert into History (Full Detail Snapshot)
            const { error: logError } = await _sb.from('inventory_history').insert(logs);
            if (logError) throw logError;
            
            alert(`SUCCESSFULLY REGISTERED ${items.length} ITEMS`);
            location.href = 'inventory.html';
        } catch (e) {
            alert("DB ERROR: " + e.message);
            btn.disabled = false; 
            btn.innerText = "REGISTER ALL ITEMS";
        }
    }

    function handleExcel(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            document.getElementById('bulk-body').innerHTML = '';
            json.forEach(row => {
                addNewRow({
                    category: row.Category || row.CATEGORY,
                    location: row.Location || row.LOCATION,
                    sku: row.SKU || row.Code,
                    item_nam: row.Description || row.Name || row.ITEM_NAM,
                    type: row.Type || row.TYPE,
                    material: row.Material || row.MATERIAL,
                    brand: row.Brand || row.BRAND,
                    unit_price: row.Price || row.PRICE,
                    uom: row.UoM || row.UOM || 'PCS'
                });
            });
        };
        reader.readAsArrayBuffer(event.target.files[0]);
    }

    window.onload = init;
</script>
</body>
</html>
