<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Items | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #0081ff;
            --success: #10b981;
            --danger: #ef4444;
            --border-main: #cbd5e1;
        }

        /* --- GLOBAL LAYOUT --- */
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; display: flex; flex-direction: column; }

        .navbar { height: 60px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; z-index: 1000; border-bottom: 3px solid var(--accent); }
        
        #nav-brand { display: flex; align-items: center; gap: 10px; height: 100%; }
        #nav-logo { max-height: 40px; width: auto; object-fit: contain; }
        .nav-title { color: white; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
        .user-label { font-size: 0.5rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .user-name { font-size: 0.7rem; color: white; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        .main-content { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; align-items: center; justify-content: center; }

        .right-panel { width: 100%; max-width: 1200px; display: flex; flex-direction: column; overflow: hidden; height: 90%; }
        .bulk-card { background: white; border-radius: 12px; border: 2px solid var(--primary); display: flex; flex-direction: column; height: 100%; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .bulk-header { padding: 12px 20px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; background: #f8fafc; flex-shrink: 0; }
        .bulk-header h2 { margin: 0; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; }

        .grid-area { flex: 1; overflow: auto; background: #fff; }
        table { border-collapse: collapse; width: 100%; min-width: 1100px; table-layout: fixed; }
        
        thead th { position: sticky; top: 0; background: #f1f5f9; font-size: 0.6rem; font-weight: 800; border-bottom: 2px solid var(--primary); border-right: 1px solid var(--border-main); text-transform: uppercase; z-index: 20; height: 40px; }
        .sticky-action { position: sticky !important; left: 0; z-index: 30; width: 45px !important; background: #f1f5f9; border-right: 1px solid var(--border-main); text-align: center; }
        .sticky-num { position: sticky !important; left: 45px; z-index: 29; width: 40px !important; background: #f1f5f9; border-right: 2px solid var(--primary); text-align: center; }

        tbody td { border-bottom: 1px solid var(--border-main); border-right: 1px solid var(--border-main); height: 44px; }
        input, select { width: 100%; height: 100%; padding: 0 8px; border: none; outline: none; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; background: transparent; }
        .price-input { color: var(--success); text-align: right; font-family: monospace; }

        .bulk-footer { padding: 12px 20px; border-top: 2px solid var(--primary); display: flex; gap: 10px; background: white; flex-shrink: 0; align-items: center; }
        
        .btn { height: 42px; border-radius: 8px; font-weight: 800; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; padding: 0 20px; transition: 0.2s; }
        .btn-import { background: var(--success); color: white; margin-left: auto; }
        .btn-add-row { background: #f1f5f9; color: var(--primary); border: 1.5px solid var(--primary); }
        .btn-save { background: var(--primary); color: white; font-size: 0.8rem; flex: 1; box-shadow: 0 4px 0 #000; }
        .btn-save:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .btn-exit { background: #64748b; color: white; }

        #excel-upload { display: none; }
    </style>
</head>
<body>

<header class="navbar">
    <div id="nav-brand">
        <img id="nav-logo" src="" alt="" style="display: none;">
        <div class="nav-title" id="nav-text">JMCYFLOW | ADD ITEMS</div>
    </div>
    <div class="user-info">
        <span class="user-label" id="display-role">STAFF</span>
        <span class="user-name"><div class="online-dot"></div><span id="display-user">USER</span></span>
    </div>
</header>

<main class="main-content">
    <div class="right-panel">
        <div class="bulk-card">
            <div class="bulk-header">
                <h2>New Item Registration</h2>
                <div>
                    <label for="excel-upload" class="btn btn-import">📁 Import Excel</label>
                    <input type="file" id="excel-upload" accept=".xlsx, .xls, .csv" onchange="handleExcel(event)">
                </div>
            </div>

            <div class="grid-area">
                <table>
                    <thead>
                        <tr>
                            <th class="sticky-action">Del</th>
                            <th class="sticky-num">#</th>
                            <th style="width: 300px;">Item Description</th>
                            <th style="width: 130px;">Brand</th>
                            <th style="width: 160px;">Category</th>
                            <th style="width: 160px;">SKU</th>
                            <th style="width: 120px;">Price</th>
                            <th style="width: 80px;">UOM</th>
                            <th style="width: 120px;">Initial Loc</th>
                        </tr>
                    </thead>
                    <tbody id="bulk-body"></tbody>
                </table>
            </div>

            <div class="bulk-footer">
                <button class="btn btn-exit" onclick="location.href='inventory.html'">Cancel</button>
                <button class="btn btn-add-row" onclick="addNewRow()">+ Add Row</button>
                <button class="btn btn-save" id="save-btn" onclick="saveAllItems()">Register All Items</button>
            </div>
        </div>
    </div>
</main>

<script>
    const SUPABASE_URL = "https://pehffyqlssrqogosfsab.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let categories = [], uomList = [], locList = [];
    const companyID = localStorage.getItem('jmcy_cid');

    async function init() {
        if(!companyID) { 
            alert("Unauthorized access. Please login via your portal.");
            location.href = 'portal.html'; 
            return; 
        }
        
        loadBranding();

        const activeUser = localStorage.getItem('jmcy_user') || 'USER';
        const activeRole = localStorage.getItem('jmcy_role') || 'STAFF';
        document.getElementById('display-user').innerText = activeUser.toUpperCase();
        document.getElementById('display-role').innerText = activeRole.toUpperCase();

        try {
            const { data: catData } = await _supabase.from('inventory_categories').select('*').eq('company_id', companyID).order('name');
            categories = catData || [];
            
            const { data: uomData } = await _supabase.from('inventory_uom').select('name').eq('company_id', companyID).order('name');
            uomList = uomData || [];
            
            const { data: locData } = await _supabase.from('inventory_locations').select('name').eq('company_id', companyID).order('name');
            locList = locData || [];

            for(let i=0; i<8; i++) addNewRow();
        } catch (err) {
            console.error("Init Error:", err.message);
        }
    }

    async function loadBranding() {
        const cachedName = localStorage.getItem('jmcy_company_name');
        const cachedLogo = localStorage.getItem('jmcy_logo');
        const logoImg = document.getElementById('nav-logo');
        const navText = document.getElementById('nav-text');

        if (cachedLogo) {
            logoImg.src = cachedLogo;
            logoImg.style.display = 'block';
        }
        if (cachedName) navText.innerText = `${cachedName.toUpperCase()} | ADD ITEMS`;

        // Sync with DB
        try {
            const { data: comp } = await _supabase.from('companies').select('company_name, logo_url').eq('id', companyID).single();
            if (comp) {
                if (comp.logo_url) {
                    logoImg.src = comp.logo_url;
                    logoImg.style.display = 'block';
                    localStorage.setItem('jmcy_logo', comp.logo_url);
                }
                navText.innerText = `${comp.company_name.toUpperCase()} | ADD ITEMS`;
                localStorage.setItem('jmcy_company_name', comp.company_name);
            }
        } catch (e) { console.warn("Branding sync failed"); }
    }

    function addNewRow(initialData = {}) {
        const tbody = document.getElementById('bulk-body');
        const tr = document.createElement('tr');
        
        const catOpts = categories.map(c => `<option value="${c.name}" data-code="${c.code}" ${initialData.category === c.name ? 'selected' : ''}>${c.name.toUpperCase()}</option>`).join('');
        const uomOpts = uomList.map(u => `<option value="${u.name}" ${initialData.uom === u.name ? 'selected' : ''}>${u.name.toUpperCase()}</option>`).join('');
        const locOpts = locList.map(l => `<option value="${l.name}" ${initialData.location === l.name ? 'selected' : ''}>${l.name.toUpperCase()}</option>`).join('');

        tr.innerHTML = `
            <td class="sticky-action"><button onclick="this.closest('tr').remove(); updateRowNumbers();" style="color:var(--danger); border:none; background:none; font-weight:900; cursor:pointer;">✕</button></td>
            <td class="sticky-num">0</td>
            <td><input type="text" class="row-name" value="${initialData.item_name || ''}" placeholder="NAME"></td>
            <td><input type="text" class="row-brand" value="${initialData.brand || ''}" placeholder="BRAND"></td>
            <td><select class="row-cat" onchange="generateRowSKU(this)"><option value="">-- SELECT --</option>${catOpts}</select></td>
            <td><input type="text" class="row-sku" readonly value="${initialData.sku || '---'}"></td>
            <td><input type="number" class="row-price price-input" value="${initialData.price || ''}" placeholder="0.00" step="0.01"></td>
            <td><select class="row-uom"><option value="PCS">PCS</option>${uomOpts}</select></td>
            <td><select class="row-loc"><option value="MAIN">MAIN</option>${locOpts}</select></td>
        `;
        tbody.appendChild(tr);
        updateRowNumbers();
    }

    function updateRowNumbers() {
        document.querySelectorAll('#bulk-body tr').forEach((row, i) => {
            row.querySelector('.sticky-num').innerText = i + 1;
        });
    }

    function generateRowSKU(selectEl) {
        const selectedOpt = selectEl.options[selectEl.selectedIndex];
        const prefix = selectedOpt.dataset.code || 'ITEM';
        const year = new Date().getFullYear().toString().slice(-2);
        const rand = Math.floor(1000 + Math.random() * 9000);
        const sku = `${prefix}-${year}-${rand}`;
        selectEl.closest('tr').querySelector('.row-sku').value = sku;
    }

    async function saveAllItems() {
        const rows = document.querySelectorAll('#bulk-body tr');
        const items = [], trans = [];
        const ref = "REG-" + Date.now().toString().slice(-6);

        rows.forEach(row => {
            const name = row.querySelector('.row-name').value.trim().toUpperCase();
            const sku = row.querySelector('.row-sku').value;
            if (name && sku !== "---") {
                items.push({ 
                    company_id: companyID,
                    item_name: name, 
                    brand: row.querySelector('.row-brand').value.toUpperCase(), 
                    category: row.querySelector('.row-cat').value, 
                    sku: sku, 
                    price: parseFloat(row.querySelector('.row-price').value) || 0,
                    uom: row.querySelector('.row-uom').value, 
                    location: row.querySelector('.row-loc').value, 
                    quantity: 0 
                });
            }
        });

        if (!items.length) return alert("Please enter at least one item.");
        const btn = document.getElementById('save-btn');
        btn.disabled = true; 
        btn.innerText = "SAVING...";

        try {
            const { error } = await _supabase.from('inventory').insert(items);
            if(error) throw error;
            alert("SUCCESSFULLY REGISTERED " + items.length + " ITEMS");
            window.location.href = 'inventory.html';
        } catch (e) { 
            alert("Error: " + e.message); 
            btn.disabled = false; 
            btn.innerText = "Register All Items"; 
        }
    }

    function handleExcel(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            document.getElementById('bulk-body').innerHTML = '';
            sheet.forEach(item => {
                addNewRow({ 
                    item_name: item.Description || item.item_name || '', 
                    brand: item.Brand || '', 
                    category: item.Category || '', 
                    price: item.Price || 0,
                    uom: item.UOM || 'PCS', 
                    location: item.Location || 'MAIN' 
                });
            });
        };
        reader.readAsArrayBuffer(file);
    }

    window.onload = init;
</script>
</body>
</html>
