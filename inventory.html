<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventory | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #0f172a; 
            --accent: #0081ff;  
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --excel-border: #cbd5e1;
            --sidebar-width-desktop: 80px;
        }

        /* Essential Reset for Mobile Fit */
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        /* Compact Navbar */
        .navbar { height: 50px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; flex-shrink: 0; z-index: 1000; border-bottom: 2px solid var(--accent); }
        .nav-logo-area { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        #company-logo-img { height: 24px; max-width: 100px; object-fit: contain; display: none; }
        #company-name-text { color: white; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
        .user-label { font-size: 0.5rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .user-name { font-size: 0.65rem; color: white; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 3px; }
        .online-dot { width: 5px; height: 5px; background: var(--success); border-radius: 50%; }

        /* Layout Structure */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Mobile Action Bar (Bottom/Top) */
        .action-bar-container { padding: 8px; background: #f1f5f9; flex-shrink: 0; }
        .toggle-group { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--primary); background: var(--primary); }
        .btn-toggle { 
            flex: 1; padding: 8px 0; border: none; border-right: 1px solid rgba(255,255,255,0.1); 
            cursor: pointer; color: rgba(255,255,255,0.6); background: var(--primary); 
            font-size: 0.55rem; font-weight: 700; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .btn-toggle.active { background: var(--accent) !important; color: white !important; }

        /* Right Panel (Search + Table) */
        .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 8px 8px 8px; }
        .search-container { margin-bottom: 8px; position: relative; flex-shrink: 0; }
        .search-input { width: 100%; padding: 10px 10px 10px 35px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 0.85rem; font-weight: 600; outline: none; }
        .search-icon { position: absolute; left: 12px; top: 10px; color: var(--primary); font-size: 0.9rem; }

        /* Table Area */
        .table-scroll-area { flex: 1; overflow: auto; background: white; border: 1px solid #cbd5e1; border-radius: 8px; }
        table { border-collapse: collapse; width: max-content; }
        
        thead th { position: sticky; top: 0; z-index: 20; background: #f8fafc; height: 35px; font-size: 0.6rem; font-weight: 800; border-bottom: 2px solid var(--primary); border-right: 1px solid var(--excel-border); color: var(--primary); text-transform: uppercase; padding: 0 8px; }
        .sticky-col { position: sticky; left: 0; z-index: 30; background: #f1f5f9 !important; border-right: 2px solid var(--primary) !important; }
        .sticky-col-2 { position: sticky; left: 40px; z-index: 30; background: white !important; border-right: 1px solid var(--excel-border) !important; }

        tbody td { height: 40px; padding: 0 8px; border-bottom: 1px solid var(--excel-border); border-right: 1px solid var(--excel-border); font-size: 0.75rem; text-align: center; white-space: nowrap; font-weight: 600; color: #1e293b; text-transform: uppercase; }
        tbody tr:hover { background-color: #f0f7ff; cursor: pointer; }
        
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 0.55rem; font-weight: 900; color: white; }
        .bg-healthy { background: var(--success); }
        .bg-low { background: var(--warning); }
        .bg-out { background: var(--danger); }

        /* Footer */
        .pagination-footer { height: 50px; background: white; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #cbd5e1; flex-shrink: 0; }
        .nav-btns { padding: 6px 15px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 0.7rem; font-weight: 800; cursor: pointer; }

        /* Desktop Adjustments */
        @media (min-width: 1024px) {
            .main-content { flex-direction: row-reverse; }
            .action-bar-container { width: var(--sidebar-width-desktop); height: 100%; padding: 0; }
            .toggle-group { flex-direction: column; height: 100%; border-radius: 0; border: none; }
            .btn-toggle { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 15px 5px; }
            .btn-toggle span:first-child { font-size: 1.2rem; }
            .right-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-logo-area" onclick="goHome()">
            <img id="company-logo-img" src="" alt="Logo">
            <span id="company-name-text">JMCYFLOW</span>
        </div>
        <div style="display:flex; align-items:center;">
            <div class="user-info">
                <span class="user-label" id="user-role-label">Staff</span>
                <span class="user-name"><div class="online-dot"></div><span id="active-user-name">---</span></span>
            </div>
            <button style="background:none; border:none; color:#ef4444; font-weight:800; cursor:pointer; font-size: 0.6rem;" onclick="handleLogout()">EXIT</button>
        </div>
    </div>

    <div class="main-content">
        <div class="action-bar-container">
            <div class="toggle-group">
                <button class="btn-toggle active" onclick="location.href='inventory.html'"><span>📋</span><span>Stock</span></button>
                <button class="btn-toggle" onclick="location.href='receiving.html'"><span>🚚</span><span>Recv</span></button>
                <button class="btn-toggle" onclick="location.href='order.html'"><span>📦</span><span>Outslip</span></button>
                <button class="btn-toggle" onclick="location.href='transfer.html'"><span>🔄</span><span>Trans</span></button>
                <button class="btn-toggle" onclick="location.href='return.html'"><span>↩️</span><span>Retn</span></button>
                <button class="btn-toggle" onclick="location.href='logs.html'"><span>📜</span><span>Logs</span></button>
            </div>
        </div>

        <div class="right-panel">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" class="search-input" placeholder="SEARCH SKU/NAME..." oninput="handleSearch()">
            </div>

            <div class="table-scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th class="sticky-col" style="width:40px;">#</th>
                            <th class="sticky-col-2" style="width:70px;">Status</th>
                            <th style="width:100px;">Category</th>
                            <th style="width:100px;">Location</th>
                            <th style="width:120px;">SKU</th>
                            <th style="width:250px;">Description</th>
                            <th style="width:100px;">Brand</th>
                            <th style="width:70px;">Qty</th>
                            <th style="width:60px;">UOM</th>
                            <th style="width:100px;">Price</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body"></tbody>
                </table>
            </div>

            <div class="pagination-footer">
                <div id="page-info" style="font-size: 0.65rem; font-weight: 800; color: var(--primary);">Page 1</div>
                <div style="gap:5px; display:flex;">
                    <button class="nav-btns" id="prevBtn" onclick="changePage(currentPage - 1)">PREV</button>
                    <button class="nav-btns" id="nextBtn" onclick="changePage(currentPage + 1)">NEXT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pehffyqlssrqogosfsab.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentPage = 1;
        const companyId = localStorage.getItem('jmcy_cid');
        const activeUser = localStorage.getItem('jmcy_user');
        const userRole = localStorage.getItem('jmcy_role');

        // Layout Preview Data (Shows if DB is empty)
        const placeholderRows = [
            { sku: 'PREVIEW-01', item_name: 'SAMPLE ITEM HEALTHY', category: 'TOOLS', location: 'A-01', brand: 'BRAND A', quantity: 50, min_qty: 5, uom: 'PCS', unit_price: 150.00 },
            { sku: 'PREVIEW-02', item_name: 'SAMPLE ITEM LOW STOCK', category: 'PARTS', location: 'B-02', brand: 'BRAND B', quantity: 3, min_qty: 5, uom: 'PCS', unit_price: 250.00 },
            { sku: 'PREVIEW-03', item_name: 'SAMPLE ITEM OUT OF STOCK', category: 'EQUIP', location: 'C-03', brand: 'BRAND C', quantity: 0, min_qty: 5, uom: 'UNIT', unit_price: 500.00 }
        ];

        async function initBranding() {
            document.getElementById('active-user-name').innerText = activeUser || "USER";
            document.getElementById('user-role-label').innerText = userRole || "Staff";
            if (!companyId) return;
            const { data } = await _supabase.from('companies').select('company_name, company_logo').eq('id', companyId).single();
            if (data) {
                if (data.company_logo) {
                    document.getElementById('company-logo-img').src = data.company_logo;
                    document.getElementById('company-logo-img').style.display = 'block';
                    document.getElementById('company-name-text').style.display = 'none';
                } else {
                    document.getElementById('company-name-text').innerText = data.company_name;
                }
            }
        }

        async function fetchInventory() {
            try {
                let query = _supabase.from('inventory').select('*', { count: 'exact' });
                
                if(companyId) query = query.eq('company_id', companyId);
                
                const search = document.getElementById('searchInput').value;
                if(search) query = query.or(`sku.ilike.%${search}%,item_name.ilike.%${search}%`);

                let { data, count, error } = await query.range((currentPage-1)*25, (currentPage*25)-1);
                
                if (!data || data.length === 0) { 
                    renderTable(placeholderRows, placeholderRows.length); 
                } else { 
                    renderTable(data, count); 
                }
            } catch (err) { 
                renderTable(placeholderRows, placeholderRows.length); 
            }
        }

        function renderTable(data, totalCount) {
            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = data.map((item, index) => {
                const qty = item.quantity || 0;
                const status = qty <= 0 ? 'bg-out">OUT' : (qty < (item.min_qty || 5) ? 'bg-low">LOW' : 'bg-healthy">OK');
                return `<tr onclick="location.href='transaction.html?sku=${item.sku}'">
                    <td class="sticky-col">${index + 1}</td>
                    <td class="sticky-col-2"><span class="badge ${status}</span></td>
                    <td>${item.category || '-'}</td>
                    <td>${item.location || '-'}</td>
                    <td style="color:var(--accent);">${item.sku || '-'}</td>
                    <td style="text-align:left;">${item.item_name || '-'}</td>
                    <td>${item.brand || '-'}</td>
                    <td>${qty}</td>
                    <td>${item.uom || 'PCS'}</td>
                    <td>₱${parseFloat(item.unit_price || 0).toFixed(2)}</td>
                </tr>`;
            }).join('');
            document.getElementById('page-info').innerText = `Page ${currentPage} (${totalCount} Total)`;
        }

        function handleSearch() { currentPage = 1; fetchInventory(); }
        function changePage(p) { if(p > 0) { currentPage = p; fetchInventory(); } }
        function goHome() { window.location.href = userRole === 'admin' ? 'dashboard.html' : 'inventory.html'; }
        function handleLogout() { localStorage.clear(); location.href = 'login.html'; }

        window.onload = () => { initBranding(); fetchInventory(); };
    </script>
</body>
</html>
