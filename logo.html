<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Identity | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        
        :root { 
            --primary: #0f172a; 
            --accent: #3b82f6; 
            --bg: #f1f5f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .config-card { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            border: 2px solid var(--primary);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            width: 100%;
            max-width: 450px; 
            text-align: center; 
            position: relative;
        }

        .badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 { 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 1.4rem; 
            margin-bottom: 8px; 
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* --- PREVIEW SECTION --- */
        .preview-label {
            font-size: 0.6rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .preview-container {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
            transition: 0.3s;
        }

        #logoPreview img { 
            max-width: 180px; 
            max-height: 80px; 
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .no-logo-text { color: #94a3b8; font-size: 0.7rem; font-weight: 600; }

        /* --- INPUT SECTION --- */
        .input-group { text-align: left; margin-bottom: 25px; }
        label { font-size: 0.7rem; font-weight: 800; color: var(--primary); margin-left: 5px; margin-bottom: 5px; display: block; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 0.9rem; 
            box-sizing: border-box;
            transition: 0.2s;
            font-family: inherit;
        }

        input:focus { 
            border-color: var(--accent); 
            outline: none; 
            background: #f0f7ff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-save { 
            width: 100%; 
            padding: 16px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-save:hover { background: #1e293b; transform: translateY(-2px); }
        .btn-save:active { transform: translateY(0); }

        .back-link { 
            margin-top: 25px; 
            font-size: 0.75rem; 
            color: #64748b; 
            cursor: pointer; 
            font-weight: 700;
            display: inline-block;
            transition: 0.2s;
        }
        .back-link:hover { color: var(--primary); }

        /* --- LOADING STATE --- */
        .loading-spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="config-card">
    <div class="badge">Identity Settings</div>
    <h2>Company Logo</h2>
    <p class="subtitle">This logo will appear on the main login screen and reports.</p>

    <span class="preview-label">Live Preview</span>
    <div class="preview-container" id="logoPreview">
        <span class="no-logo-text">No logo detected</span>
    </div>

    <div class="input-group">
        <label>Direct Image URL</label>
        <input type="text" id="logoUrl" placeholder="https://example.com/logo.png" autocomplete="off">
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveLogo()">
        <div class="loading-spinner" id="spinner"></div>
        <span>Save Branding</span>
    </button>
    
    <span class="back-link" onclick="location.href='dashboard.html'">← Return to Dashboard</span>
</div>

<script>
    const SUPABASE_URL = "https://pehffyqlssrqogosfsab.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const companyId = localStorage.getItem('jmcy_cid');
    const logoInput = document.getElementById('logoUrl');
    const previewDiv = document.getElementById('logoPreview');
    const saveBtn = document.getElementById('saveBtn');
    const spinner = document.getElementById('spinner');

    // 1. Load existing logo on start
    async function loadCurrentLogo() {
        if(!companyId) return;
        
        const { data, error } = await _supabase
            .from('companies')
            .select('company_logo')
            .eq('id', companyId)
            .single();

        if (data && data.company_logo) {
            logoInput.value = data.company_logo;
            updatePreview(data.company_logo);
        }
    }

    // 2. Save logic
    async function saveLogo() {
        const url = logoInput.value.trim();
        if(!url) return alert("Please provide a valid image URL first.");

        // Show loading
        saveBtn.disabled = true;
        spinner.style.display = "block";

        const { error } = await _supabase
            .from('companies')
            .update({ company_logo: url })
            .eq('id', companyId);

        if(!error) {
            alert("Identity Updated Successfully!");
            location.href = 'dashboard.html';
        } else {
            alert("Error: " + error.message);
            saveBtn.disabled = false;
            spinner.style.display = "none";
        }
    }

    // 3. Helper: Live Preview
    function updatePreview(val) {
        if(val) {
            previewDiv.innerHTML = `<img src="${val}" onerror="this.parentElement.innerHTML='<span class=\'no-logo-text\'>Invalid Image URL</span>'">`;
            previewDiv.style.borderStyle = "solid";
            previewDiv.style.borderColor = "var(--accent)";
        } else {
            previewDiv.innerHTML = `<span class="no-logo-text">No logo detected</span>`;
            previewDiv.style.borderStyle = "dashed";
            previewDiv.style.borderColor = "#cbd5e1";
        }
    }

    logoInput.addEventListener('input', (e) => updatePreview(e.target.value));

    window.onload = loadCurrentLogo;
</script>
</body>
</html>
