<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sales Order | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #0f172a;
            --accent: #0081ff;
            --success: #10b981;
            --danger: #ef4444;
            --border-main: #cbd5e1;
            --sidebar-width-desktop: 80px;
        }

        /* --- GLOBAL LAYOUT --- */
        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        /* Navbar - Dynamic Branding */
        .navbar { height: 55px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; border-bottom: 3px solid var(--accent); }
        .nav-logo-area img { height: 28px; display: none; }
        #company-name-text { color: white; font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
        .user-label { font-size: 0.5rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .user-name { font-size: 0.65rem; color: white; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Navigation Rail */
        .action-bar-container { padding: 8px; background: #f1f5f9; flex-shrink: 0; }
        .toggle-group { display: flex; border-radius: 10px; overflow: hidden; background: var(--primary); border: 1px solid var(--primary); }
        .btn-toggle { 
            flex: 1; padding: 10px 0; border: none; border-right: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); background: var(--primary); cursor: pointer;
            font-size: 0.6rem; font-weight: 700; text-transform: uppercase; 
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .btn-toggle.active { background: var(--accent) !important; color: white !important; }

        /* Content Panel */
        .right-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; gap: 10px; }
        
        /* Desktop Mode */
        @media (min-width: 1024px) {
            .main-content { flex-direction: row-reverse; }
            .action-bar-container { width: var(--sidebar-width-desktop); height: 100%; padding: 0; }
            .toggle-group { flex-direction: column; height: 100%; border-radius: 0; }
            .btn-toggle { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 25px 5px; }
            .btn-toggle span:first-child { font-size: 1.3rem; }
            .right-panel { padding: 30px; display: grid; grid-template-columns: 400px 1fr; gap: 20px; align-items: start; }
            #save-btn { grid-column: span 2; }
        }

        /* UI Cards */
        .input-card { background: white; border-radius: 12px; border: 1px solid var(--border-main); padding: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.55rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border-main); border-radius: 8px; font-size: 0.8rem; font-weight: 700; outline: none; text-transform: uppercase; }
        input[readonly] { background: #f8fafc; color: #64748b; }

        /* Table Design */
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border-main); display: flex; flex-direction: column; overflow: hidden; min-height: 250px; }
        .table-header { background: #f8fafc; padding: 12px; font-weight: 800; font-size: 0.65rem; color: var(--primary); border-bottom: 1px solid var(--border-main); }
        .scroll-area { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th { position: sticky; top: 0; background: #f8fafc; padding: 10px; font-size: 0.6rem; border-bottom: 2px solid var(--primary); text-align: left; z-index: 10; }
        tbody td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.75rem; font-weight: 600; }

        .summary-bar { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; }
        .grand-total { color: var(--success); font-size: 1.1rem; }

        /* Buttons */
        .btn { border: none; border-radius: 8px; padding: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; width: 100%; margin-top: 10px; font-size: 0.7rem; }
        .btn-submit { background: var(--success); color: white; width: 100%; font-size: 0.85rem; box-shadow: 0 4px 0 #059669; }
        .btn-submit:disabled { background: #94a3b8; box-shadow: none; opacity: 0.7; }

        .stock-tag { font-size: 0.6rem; color: var(--accent); font-weight: 800; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-logo-area">
        <img id="company-logo-img" src="" alt="Logo">
        <span id="company-name-text">JMCYFLOW</span>
    </div>
    <div style="display:flex; align-items:center;">
        <div class="user-info">
            <span class="user-label" id="user-role-label">System Admin</span>
            <span class="user-name"><div class="online-dot"></div><span id="active-user">Admin</span></span>
        </div>
        <button style="background:none; border:none; color:#ef4444; font-weight:800; cursor:pointer; font-size:0.65rem;" onclick="handleLogout()">LOGOUT</button>
    </div>
</header>

<main class="main-content">
    <div class="action-bar-container">
        <div class="toggle-group" id="nav-rail">
            <button class="btn-toggle" onclick="location.href='inventory.html'"><span>📋</span><span>Stock</span></button>
            <button class="btn-toggle" onclick="location.href='receiving.html'"><span>🚚</span><span>Recv</span></button>
            <button class="btn-toggle active"><span>💰</span><span>Sales</span></button>
            <button class="btn-toggle" onclick="location.href='transfer.html'"><span>🔄</span><span>Trans</span></button>
            <button class="btn-toggle" onclick="location.href='return.html'"><span>↩️</span><span>Retn</span></button>
        </div>
    </div>

    <div class="right-panel">
        <div class="input-card">
            <div class="form-grid">
                <div class="form-group">
                    <label>Sale Date</label>
                    <input type="date" id="trans-date">
                </div>
                <div class="form-group">
                    <label>SO Number</label>
                    <input type="text" id="so-number" readonly>
                </div>
                <div class="form-group full-width">
                    <label>Customer Name</label>
                    <input type="text" id="customer-name" placeholder="ENTER CLIENT NAME">
                </div>
                <div class="form-group full-width">
                    <label>Search Product</label>
                    <input list="items-list" id="item-search" placeholder="SCAN OR SEARCH SKU..." onchange="handleSelection()">
                    <datalist id="items-list"></datalist>
                    <span id="stock-preview" class="stock-tag">Select an item to see stock</span>
                </div>
                <div class="form-group">
                    <label>Unit Price (₱)</label>
                    <input type="number" id="unit-price" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Qty to Release</label>
                    <input type="number" id="release-qty" placeholder="0">
                </div>
            </div>
            <button class="btn btn-add" onclick="addToBatch()">Add to Sales List ↓</button>
        </div>

        <div class="table-container">
            <div class="table-header">Items in Current Order</div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th style="text-align: center;">X</th>
                        </tr>
                    </thead>
                    <tbody id="batch-body"></tbody>
                </table>
            </div>
            <div class="summary-bar">
                <div>Items: <span id="total-items">0</span></div>
                <div class="grand-total">₱<span id="grand-total">0.00</span></div>
            </div>
        </div>

        <button class="btn btn-submit" id="save-btn" onclick="processOrder()">Confirm & Post Sales Order</button>
    </div>
</main>

<script>
    // Initialize Supabase (Using your existing credentials)
    const _supabase = supabase.createClient('https://crruounuhtfzyssyhgcc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNycnVvdW51aHRmenlzc3loZ2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyMjc5NDgsImV4cCI6MjA4NjgwMzk0OH0.PMLb-8HZLdXUxXk2Jv0f836_YVWcaS3X2ezCvjfG6jg');

    let masterInventory = [];
    let selectedItem = null;
    let batchItems = [];
    const companyID = localStorage.getItem('companyID');
    const activeUser = localStorage.getItem('activeAdmin');

    async function init() {
        if (!activeUser) { location.href = 'index.html'; return; }
        
        // Setup Date & SO#
        document.getElementById('trans-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('so-number').value = `SO-${Date.now().toString().slice(-6)}`;
        document.getElementById('active-user').innerText = activeUser;

        await fetchBranding();
        await loadInventory();
    }

    async function fetchBranding() {
        const { data } = await _supabase.from('companies').select('*').eq('id', companyID).single();
        if (data) {
            document.getElementById('company-name-text').innerText = data.company_name;
            if (data.company_logo) {
                const img = document.getElementById('company-logo-img');
                img.src = data.company_logo;
                img.style.display = 'block';
                document.getElementById('company-name-text').style.display = 'none';
            }
        }
    }

    async function loadInventory() {
        const { data } = await _supabase.from('inventory').select('*').eq('company_id', companyID).order('item_name');
        masterInventory = data || [];
        document.getElementById('items-list').innerHTML = masterInventory.map(i => 
            `<option value="${i.sku} | ${i.item_name}">`
        ).join('');
    }

    function handleSelection() {
        const val = document.getElementById('item-search').value.split(' | ')[0];
        selectedItem = masterInventory.find(i => i.sku === val);
        if (selectedItem) {
            document.getElementById('unit-price').value = selectedItem.unit_price || 0;
            document.getElementById('stock-preview').innerText = `CURRENT STOCK: ${selectedItem.quantity} ${selectedItem.uom}`;
            document.getElementById('release-qty').focus();
        }
    }

    function addToBatch() {
        const qty = parseInt(document.getElementById('release-qty').value);
        const price = parseFloat(document.getElementById('unit-price').value);
        
        if (!selectedItem || isNaN(qty) || qty <= 0) return alert("Select item and quantity.");
        if (qty > selectedItem.quantity) return alert(`Insufficient Stock! Available: ${selectedItem.quantity}`);

        batchItems.push({ ...selectedItem, sellQty: qty, sellPrice: price, lineTotal: qty * price });
        renderTable();
        
        // Reset inputs
        document.getElementById('item-search').value = "";
        document.getElementById('release-qty').value = "";
        document.getElementById('stock-preview').innerText = "Select an item to see stock";
        selectedItem = null;
    }

    function renderTable() {
        const tbody = document.getElementById('batch-body');
        tbody.innerHTML = batchItems.map((item, idx) => `
            <tr>
                <td><strong>${item.sku}</strong><br><small>${item.item_name}</small></td>
                <td><span style="color:var(--danger)">-${item.sellQty}</span></td>
                <td>₱${item.lineTotal.toLocaleString()}</td>
                <td style="text-align:center;"><button onclick="removeItem(${idx})" style="border:none; background:none; color:red; cursor:pointer">✕</button></td>
            </tr>
        `).join('');

        const total = batchItems.reduce((sum, i) => sum + i.lineTotal, 0);
        document.getElementById('total-items').innerText = batchItems.length;
        document.getElementById('grand-total').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    function removeItem(idx) {
        batchItems.splice(idx, 1);
        renderTable();
    }

    async function processOrder() {
        const cust = document.getElementById('customer-name').value.trim();
        if (!cust || batchItems.length === 0) return alert("Missing Customer or Items!");

        const btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.innerText = "POSTING...";

        try {
            for (const item of batchItems) {
                // 1. Deduct Stock
                const newQty = item.quantity - item.sellQty;
                await _supabase.from('inventory').update({ quantity: newQty }).eq('id', item.id);

                // 2. Log Transaction
                await _supabase.from('inventory_transactions').insert([{
                    company_id: companyID,
                    reference_id: document.getElementById('so-number').value,
                    type: 'SALE',
                    sku: item.sku,
                    item_name: item.item_name,
                    qty_change: -item.sellQty,
                    notes: `CUSTOMER: ${cust.toUpperCase()}`
                }]);
            }

            alert("SUCCESS: Sales Order Posted & Stock Updated.");
            location.reload();
        } catch (err) {
            alert("Error: " + err.message);
            btn.disabled = false;
        }
    }

    function handleLogout() { localStorage.clear(); location.href = 'index.html'; }
    init();
</script>
</body>
</html>
