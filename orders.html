<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outslip | JmcyFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #0f172a;
            --accent: #0081ff;
            --success: #10b981;
            --danger: #ef4444;
            --border-main: #cbd5e1;
            --sidebar-width-desktop: 80px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100dvh; margin: 0; padding: 0; overflow: hidden; background: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

        /* Navbar */
        .navbar { height: 50px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; flex-shrink: 0; border-bottom: 2px solid var(--accent); }
        #company-name-text { color: white; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; margin-right: 10px; }
        .user-label { font-size: 0.5rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; }
        .user-name { font-size: 0.65rem; color: white; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
        .online-dot { width: 5px; height: 5px; background: var(--success); border-radius: 50%; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Navigation Rail */
        .action-bar-container { padding: 8px; background: #f1f5f9; flex-shrink: 0; }
        .toggle-group { display: flex; border-radius: 8px; overflow: hidden; background: var(--primary); border: 1px solid var(--primary); }
        .btn-toggle { 
            flex: 1; padding: 8px 0; border: none; border-right: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); background: var(--primary); cursor: pointer;
            font-size: 0.55rem; font-weight: 700; text-transform: uppercase; 
            display: flex; flex-direction: column; gap: 2px; align-items: center;
        }
        .btn-toggle.active { background: var(--accent) !important; color: white !important; }

        /* Panels */
        .right-panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 8px; gap: 8px; }
        
        @media (min-width: 1024px) {
            .main-content { flex-direction: row-reverse; }
            .action-bar-container { width: var(--sidebar-width-desktop); height: 100%; padding: 0; }
            .toggle-group { flex-direction: column; height: 100%; border-radius: 0; }
            .btn-toggle { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 18px 5px; }
            .btn-toggle span:first-child { font-size: 1.2rem; }
            .right-panel { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        }

        /* UI Elements */
        .input-card { background: white; border-radius: 8px; border: 1px solid var(--border-main); padding: 15px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        
        label { display: block; font-size: 0.55rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid var(--border-main); border-radius: 6px; font-size: 0.8rem; font-weight: 700; outline: none; text-transform: uppercase; }
        input:focus { border-color: var(--accent); }

        .table-container { background: white; border-radius: 8px; border: 1px solid var(--border-main); display: flex; flex-direction: column; overflow: hidden; }
        .table-header { background: #f8fafc; padding: 10px; font-weight: 800; font-size: 0.65rem; color: var(--primary); border-bottom: 1px solid var(--border-main); display: flex; justify-content: space-between; }
        
        .scroll-area { flex: 1; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead th { position: sticky; top: 0; background: #f8fafc; padding: 10px; font-size: 0.55rem; border-bottom: 1px solid var(--border-main); text-align: left; text-transform: uppercase; color: #64748b; }
        tbody td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }

        .summary-bar { background: var(--primary); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; }
        
        .btn { border: none; border-radius: 6px; padding: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-add { background: var(--primary); color: white; margin-top: 10px; width: 200px; align-self: flex-end; }
        .btn-submit { background: var(--success); color: white; width: 100%; font-size: 0.85rem; margin-top: 10px; box-shadow: 0 4px 0 #059669; }
        
        .qty-out { color: var(--danger); font-weight: 800; }
        .tag { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; color: var(--primary); border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

<header class="navbar">
    <div class="nav-logo-area" onclick="location.href='inventory.html'">
        <span id="company-name-text">JMCYFLOW</span>
    </div>
    <div style="display:flex; align-items:center;">
        <div class="user-info">
            <span class="user-label" id="role-tag">Staff</span>
            <span class="user-name"><div class="online-dot"></div><span id="active-user">---</span></span>
        </div>
        <button onclick="handleLogout()" style="background:none; border:none; color:#ef4444; font-weight:800; cursor:pointer; font-size:0.6rem;">EXIT</button>
    </div>
</header>

<main class="main-content">
    <div class="action-bar-container">
        <div class="toggle-group">
            <button class="btn-toggle" onclick="location.href='inventory.html'"><span>📋</span><span>Stock</span></button>
            <button class="btn-toggle" onclick="location.href='receiving.html'"><span>🚚</span><span>Recv</span></button>
            <button class="btn-toggle active"><span>📦</span><span>Outslip</span></button>
            <button class="btn-toggle" onclick="location.href='transfer.html'"><span>🔄</span><span>Trans</span></button>
            <button class="btn-toggle" onclick="location.href='return.html'"><span>↩️</span><span>Retn</span></button>
            <button class="btn-toggle" onclick="location.href='logs.html'"><span>📜</span><span>Logs</span></button>
        </div>
    </div>

    <div class="right-panel">
        <div class="input-card" style="display: flex; flex-direction: column;">
            <div class="form-grid">
                <div class="form-group">
                    <label>Order Date</label>
                    <input type="date" id="order-date">
                </div>
                <div class="form-group">
                    <label>Reference / SO #</label>
                    <input type="text" id="so-number" readonly>
                </div>
                <div class="form-group">
                    <label>Customer / Destination</label>
                    <input type="text" id="customer-name" placeholder="RECIPIENT NAME">
                </div>
                <div class="form-group">
                    <label>Search Item (SKU or Description)</label>
                    <input type="text" id="search-input" placeholder="TYPE SKU OR NAME..." oninput="searchInventory()">
                    <div id="search-results" style="position: absolute; background: white; border: 1px solid #ccc; z-index: 100; width: 300px; display:none; max-height: 200px; overflow-y: auto; font-size: 0.7rem; box-shadow: 0 4px 10px rgba(0,0,0,0.1);"></div>
                </div>
                <div class="form-group">
                    <label>Release Quantity</label>
                    <input type="number" id="qty-input" placeholder="0">
                </div>
            </div>
            <button class="btn btn-add" onclick="addItem()">Add to Batch ↓</button>
        </div>

        <div class="table-container">
            <div class="table-header">Items Ready for Release</div>
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>SKU</th>
                            <th>Location</th>
                            <th>Description</th>
                            <th>Brand</th>
                            <th>Qty Out</th>
                            <th>UOM</th>
                            <th style="text-align: center;">X</th>
                        </tr>
                    </thead>
                    <tbody id="list-body"></tbody>
                </table>
            </div>
            <div class="summary-bar">
                <span>Unique SKUs: <span id="item-count">0</span></span>
                <span>Total Units: <span id="total-units">0</span></span>
            </div>
        </div>

        <button class="btn btn-submit" onclick="submitOrder()">Confirm & Post Outslip</button>
    </div>
</main>

<script>
    const _sb = supabase.createClient('https://pehffyqlssrqogosfsab.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBlaGZmeXFsc3NycW9nb3Nmc2FiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3OTUsImV4cCI6MjA4OTU5NDc5NX0.xvnbRP1kG2x55HNPI7NbZoz3NhSRWWHBeIVS9jKib9s');

    const companyId = localStorage.getItem('jmcy_cid');
    const user = localStorage.getItem('jmcy_user') || "DEMO USER";
    
    let masterInventory = []; 
    let selectedItem = null;
    let batchList = [];

    window.onload = async () => {
        document.getElementById('active-user').innerText = user;
        document.getElementById('order-date').valueAsDate = new Date();
        document.getElementById('so-number').value = 'SO-' + Date.now().toString().slice(-6);
        
        // Mock data for preview
        batchList = [
            { category: 'Hardware', sku: 'SKU-7721', location: 'Rack A1', item_name: 'Monitor Stand', brand: 'Dell', qty: 5, uom: 'PCS', isDemo: true }
        ];
        
        if(companyId) await loadMasterInventory();
        render();
    };

    async function loadMasterInventory() {
        const { data } = await _sb.from('inventory').select('*').eq('company_id', companyId);
        masterInventory = data || [];
    }

    function searchInventory() {
        const query = document.getElementById('search-input').value.toUpperCase();
        const resultsBox = document.getElementById('search-results');
        if(query.length < 2) { resultsBox.style.display = 'none'; return; }

        const matches = masterInventory.filter(i => 
            i.sku.toUpperCase().includes(query) || 
            i.item_name.toUpperCase().includes(query)
        );

        if(matches.length > 0) {
            resultsBox.innerHTML = matches.map(i => `
                <div style="padding: 10px; border-bottom: 1px solid #eee; cursor:pointer;" onclick="selectItem('${i.sku}')">
                    <strong>${i.sku}</strong> - ${i.item_name} <br>
                    <small>Stock: ${i.quantity} | Loc: ${i.location}</small>
                </div>
            `).join('');
            resultsBox.style.display = 'block';
        } else {
            resultsBox.style.display = 'none';
        }
    }

    function selectItem(sku) {
        selectedItem = masterInventory.find(i => i.sku === sku);
        document.getElementById('search-input').value = `${selectedItem.sku} | ${selectedItem.item_name}`;
        document.getElementById('search-results').style.display = 'none';
        document.getElementById('qty-input').focus();
    }

    function addItem() {
        const qty = parseInt(document.getElementById('qty-input').value);
        if(!selectedItem || isNaN(qty) || qty <= 0) return alert("Select an item and valid quantity");

        if(qty > selectedItem.quantity) return alert("Error: Insufficient stock available.");

        batchList = batchList.filter(i => !i.isDemo); // Remove demo items
        
        batchList.push({
            category: selectedItem.category,
            sku: selectedItem.sku,
            location: selectedItem.location,
            item_name: selectedItem.item_name,
            brand: selectedItem.brand,
            qty: qty,
            uom: selectedItem.uom,
            isDemo: false
        });

        render();
        // Clear inputs
        document.getElementById('search-input').value = "";
        document.getElementById('qty-input').value = "";
        selectedItem = null;
    }

    function render() {
        const body = document.getElementById('list-body');
        body.innerHTML = batchList.map((item, idx) => `
            <tr>
                <td><span class="tag">${item.category}</span></td>
                <td style="color:var(--accent)">${item.sku}</td>
                <td>${item.location}</td>
                <td>${item.item_name}</td>
                <td>${item.brand}</td>
                <td class="qty-out">-${item.qty}</td>
                <td>${item.uom}</td>
                <td style="text-align:center; color:red; cursor:pointer; font-weight:bold;" onclick="remove(${idx})">✕</td>
            </tr>
        `).join('');

        document.getElementById('item-count').innerText = batchList.length;
        document.getElementById('total-units').innerText = batchList.reduce((sum, i) => sum + i.qty, 0);
    }

    function remove(idx) { batchList.splice(idx, 1); render(); }

    async function submitOrder() {
        const realItems = batchList.filter(i => !i.isDemo);
        if(realItems.length === 0) return alert("No items to process.");
        const customer = document.getElementById('customer-name').value || "UNSPECIFIED";
        const so = document.getElementById('so-number').value;

        if(!confirm("Post this Outslip? Stock will be deducted immediately.")) return;

        try {
            for(let item of realItems) {
                const { error } = await _sb.rpc('handle_outslip', {
                    p_company_id: companyId,
                    p_sku: item.sku,
                    p_qty_out: item.qty,
                    p_conducted_by: user,
                    p_reference_no: so,
                    p_customer: customer
                });
                if(error) throw error;
            }
            alert("Stock Updated and Logged Successfully!");
            location.reload();
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    function handleLogout() { localStorage.clear(); location.href='login.html'; }
</script>
</body>
</html>
